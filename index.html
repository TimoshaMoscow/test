<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Тимофеевка — маркетплейс свежих продуктов</title>
  <!-- SEO мета-теги -->
  <meta name="description" content="Маркетплейс Тимофеевка: фермерские продукты, овощи, фрукты, молочная продукция с доставкой. Матовое стекло, удобная корзина.">
  <meta name="keywords" content="Тимофеевка, маркетплейс, фермерские продукты, овощи, фрукты, молоко, сыр, доставка еды">
  <meta name="author" content="Тимофеевка">
  <link rel="canonical" href="https://timofeevka.market">
  <!-- PWA / Манифест и иконки (генерируем в head) -->
  <link rel="manifest" href="#manifest-placeholder">
  <meta name="theme-color" content="#276fdb">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192/276fdb/ffffff?text=Т">
  <!-- Font Awesome 6 (иконки) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Глобальные переменные и сброс */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    :root {
      --primary: #276fdb;                /* Глубокие прятки */
      --primary-light: #4f8ef0;
      --primary-dark: #1a4f9e;
      --glass-bg: rgba(255, 255, 255, 0.3);
      --glass-border: rgba(255, 255, 255, 0.5);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
      --text-dark: #1e2a41;
      --text-light: #f8faff;
      --backdrop-blur: blur(12px);
    }

    body {
      background: linear-gradient(145deg, #f0f5fe 0%, #d9e6ff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text-dark);
    }

    /* Основной стиль матового стекла */
    .glass-card, header, footer, .product-card, .cart-panel, .search-box, .category-btn, .pagination-btn {
      background: var(--glass-bg);
      backdrop-filter: var(--backdrop-blur);
      -webkit-backdrop-filter: var(--backdrop-blur);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--glass-shadow);
    }

    /* Типографика */
    h1, h2, h3 {
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    /* Хедер с навигацией (имитация многостраничности) */
    header {
      margin: 16px 20px;
      padding: 12px 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.4);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--primary-dark);
      background: rgba(255,255,255,0.5);
      padding: 6px 14px;
      border-radius: 40px;
    }

    .logo i {
      color: var(--primary);
      margin-right: 8px;
    }

    /* Поиск — матовое стекло */
    .search-box {
      display: flex;
      align-items: center;
      padding: 8px 18px;
      background: rgba(255,255,255,0.35);
      flex: 1 1 300px;
      max-width: 500px;
      margin: 0 20px;
    }

    .search-box i {
      color: var(--primary-dark);
      font-size: 1.2rem;
      margin-right: 12px;
      opacity: 0.8;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      font-size: 1rem;
      padding: 8px 0;
      color: var(--text-dark);
    }

    .search-box input::placeholder {
      color: rgba(26, 79, 158, 0.7);
      font-weight: 300;
    }

    /* Иконки пользователя и корзины */
    .user-actions {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .user-actions .cart-icon, .user-actions .profile-icon {
      font-size: 1.6rem;
      color: var(--primary-dark);
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -12px;
      background: var(--primary);
      color: white;
      font-size: 0.8rem;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 50px;
      border: 2px solid white;
    }

    /* навигационные кнопки — страницы */
    .nav-pages {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      width: 100%;
      justify-content: center;
    }

    .nav-page-btn {
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(5px);
      border: 1px solid var(--glass-border);
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
      color: var(--primary-dark);
      cursor: pointer;
      transition: 0.15s;
    }

    .nav-page-btn.active {
      background: var(--primary);
      color: white;
      border-color: white;
    }

    /* Основной контейнер */
    main {
      flex: 1;
      margin: 0 20px 30px;
    }

    /* Категории (матовые кнопки) */
    .categories-section {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0;
      justify-content: center;
    }

    .category-btn {
      padding: 10px 24px;
      background: rgba(255,255,255,0.25);
      font-size: 1rem;
      font-weight: 500;
      color: var(--primary-dark);
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 40px;
    }

    .category-btn.active {
      background: var(--primary);
      color: white;
      border-color: white;
    }

    /* Сетка товаров */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      margin-top: 24px;
    }

    /* Карточка товара (матовое стекло) */
    .product-card {
      padding: 20px 16px 20px;
      background: rgba(255,255,255,0.25);
      display: flex;
      flex-direction: column;
      transition: 0.2s;
      cursor: pointer;
      border-radius: 32px;
    }

    .product-card:hover {
      background: rgba(255,255,255,0.45);
      transform: scale(1.01);
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 28px;
      background: #fff2d7; /* fallback */
      margin-bottom: 16px;
      border: 2px solid rgba(255,255,255,0.5);
    }

    .product-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .product-price {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--primary-dark);
      margin: 10px 0 14px;
    }

    .product-price small {
      font-size: 0.9rem;
      font-weight: 400;
      opacity: 0.8;
    }

    .add-to-cart-btn {
      background: var(--primary);
      border: none;
      color: white;
      padding: 14px 0;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      backdrop-filter: blur(4px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: 0.15s;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .add-to-cart-btn:hover {
      background: var(--primary-dark);
    }

    /* Корзина (выезжающая панель) */
    .cart-overlay {
      position: fixed;
      top: 0; right: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(3px);
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
      z-index: 1000;
      display: flex;
      justify-content: flex-end;
    }

    .cart-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .cart-panel {
      width: min(420px, 96%);
      background: rgba(255,255,255,0.75);
      backdrop-filter: var(--backdrop-blur);
      height: 100%;
      margin: 10px;
      border-radius: 36px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      transform: translateX(30px);
      transition: 0.3s;
      border: 2px solid rgba(255,255,255,0.7);
    }

    .cart-overlay.active .cart-panel {
      transform: translateX(0);
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .cart-header h2 {
      font-size: 1.8rem;
    }

    .close-cart {
      background: none;
      border: none;
      font-size: 2.2rem;
      cursor: pointer;
      color: var(--primary-dark);
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      margin-bottom: 20px;
    }

    .cart-item {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid rgba(39, 111, 219, 0.2);
    }

    .cart-item img {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      object-fit: cover;
      background: #ccc;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-title {
      font-weight: 600;
    }

    .cart-item-price {
      color: var(--primary-dark);
    }

    .cart-item-remove {
      color: var(--primary);
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
    }

    .cart-total {
      font-size: 1.8rem;
      font-weight: 700;
      margin-top: 16px;
      text-align: right;
    }

    .checkout-btn {
      background: var(--primary);
      border: none;
      color: white;
      padding: 20px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 20px;
      cursor: pointer;
    }

    /* Футер */
    footer {
      margin: 16px 20px;
      padding: 20px;
      background: rgba(255,255,255,0.3);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      color: var(--primary-dark);
    }

    .footer-links a {
      color: var(--primary-dark);
      margin: 0 12px;
      text-decoration: none;
      font-weight: 500;
    }

    /* Пагинация (простая) */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 40px 0 20px;
    }

    .pagination-btn {
      padding: 12px 24px;
      background: rgba(255,255,255,0.2);
      font-size: 1.2rem;
    }

    /* Адаптивность */
    @media (max-width: 680px) {
      header {
        flex-direction: column;
        align-items: stretch;
      }
      .search-box {
        margin: 15px 0;
        max-width: 100%;
      }
      .user-actions {
        justify-content: flex-end;
      }
      .logo {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<!-- Хедер с навигацией по страницам (имитация многостраничности) -->
<header>
  <div class="logo-area">
    <div class="logo"><i class="fas fa-leaf"></i> Тимофеевка</div>
  </div>
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Поиск товаров..." aria-label="Поиск">
  </div>
  <div class="user-actions">
    <div class="profile-icon"><i class="fas fa-user-circle"></i></div>
    <div class="cart-icon" id="cartToggleBtn">
      <i class="fas fa-shopping-basket"></i>
      <span class="cart-count" id="cartCounter">0</span>
    </div>
  </div>
  <!-- псевдо-страницы: Главная, Каталог, О нас (переключение через js) -->
  <div class="nav-pages">
    <button class="nav-page-btn active" data-page="home">Главная</button>
    <button class="nav-page-btn" data-page="catalog">Каталог</button>
    <button class="nav-page-btn" data-page="about">О нас</button>
  </div>
</header>

<main id="mainContent">
  <!-- Контент будет динамически подменяться через JS (SPA-подход) -->
</main>

<!-- Корзина оверлей -->
<div class="cart-overlay" id="cartOverlay">
  <div class="cart-panel">
    <div class="cart-header">
      <h2><i class="fas fa-shopping-basket" style="margin-right: 12px;"></i>Корзина</h2>
      <button class="close-cart" id="closeCartBtn">&times;</button>
    </div>
    <ul class="cart-items" id="cartItemsList">
      <!-- динамические элементы корзины -->
    </ul>
    <div class="cart-total" id="cartTotal">0 ₽</div>
    <button class="checkout-btn" id="checkoutBtn">Оформить заказ <i class="fas fa-arrow-right"></i></button>
  </div>
</div>

<footer>
  <div class="footer-copy">© 2025 Тимофеевка. Все права защищены.</div>
  <div class="footer-links">
    <a href="#">Политика</a>
    <a href="#">Доставка</a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-telegram"></i></a>
  </div>
</footer>

<script>
  (function() {
    // ----- Глобальные данные -----
    // Товары (изображения с интернета — placeholder картинки с тематическими ссылками)
    const products = [
      { id: 1, name: 'Картофель молодой', price: 89, category: 'ovoshi', img: 'https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400&auto=format&fit=crop' },
      { id: 2, name: 'Морковь сладкая', price: 65, category: 'ovoshi', img: 'https://images.unsplash.com/photo-1598170845058-32b9d6a5da37?w=400&auto=format&fit=crop' },
      { id: 3, name: 'Яблоки семеренко', price: 129, category: 'frukty', img: 'https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=400&auto=format&fit=crop' },
      { id: 4, name: 'Сыр козий', price: 350, category: 'milk', img: 'https://images.unsplash.com/photo-1486297678162-eb2a19b0a32d?w=400&auto=format&fit=crop' },
      { id: 5, name: 'Молоко фермерское', price: 95, category: 'milk', img: 'https://images.unsplash.com/photo-1563636619-e9143da7973b?w=400&auto=format&fit=crop' },
      { id: 6, name: 'Помидоры черри', price: 210, category: 'ovoshi', img: 'https://images.unsplash.com/photo-1597361613054-113b9c7d54f9?w=400&auto=format&fit=crop' },
      { id: 7, name: 'Клубника', price: 320, category: 'frukty', img: 'https://images.unsplash.com/photo-1464965911861-746a04b4bca6?w=400&auto=format&fit=crop' },
      { id: 8, name: 'Творог 5%', price: 180, category: 'milk', img: 'https://images.unsplash.com/photo-1631451095765-2c91616fc9e6?w=400&auto=format&fit=crop' }
    ];

    // Категории
    const categories = [
      { id: 'all', name: 'Все' },
      { id: 'ovoshi', name: 'Овощи' },
      { id: 'frukty', name: 'Фрукты' },
      { id: 'milk', name: 'Молочные' }
    ];

    // Состояние
    let currentPage = 'home';            // home, catalog, about
    let currentCategory = 'all';
    let searchQuery = '';
    let cart = JSON.parse(localStorage.getItem('timofeevka_cart')) || [];

    // ----- Элементы DOM -----
    const mainEl = document.getElementById('mainContent');
    const cartOverlay = document.getElementById('cartOverlay');
    const cartToggleBtn = document.getElementById('cartToggleBtn');
    const closeCartBtn = document.getElementById('closeCartBtn');
    const cartItemsList = document.getElementById('cartItemsList');
    const cartTotalSpan = document.getElementById('cartTotal');
    const cartCounter = document.getElementById('cartCounter');
    const searchInput = document.getElementById('searchInput');
    const navPageBtns = document.querySelectorAll('.nav-page-btn');

    // ----- Рендер страниц (многостраничность) -----
    function renderPage() {
      if (currentPage === 'home') renderHome();
      else if (currentPage === 'catalog') renderCatalog();
      else if (currentPage === 'about') renderAbout();
      updateCartCounter(); // обновляем счетчик везде
    }

    function renderHome() {
      let html = `
        <section style="margin: 30px 0; text-align: center;" class="glass-card" style="padding: 48px 20px;">
          <h1 style="font-size: 2.5rem; color: var(--primary-dark);"><i class="fas fa-seedling" style="color: var(--primary);"></i> Тимофеевка — маркетплейс свежести</h1>
          <p style="max-width: 700px; margin: 24px auto; font-size: 1.2rem;">Овощи, фрукты, молочная продукция прямо с фермы. Матовое стекло и глубокие прятки.</p>
          <button class="category-btn" style="font-size: 1.2rem; padding: 16px 40px;" onclick="window.app.setPage('catalog')">Перейти в каталог</button>
        </section>
        <h2 style="margin-top: 40px;">Популярные товары</h2>
        <div class="products-grid" id="productsGridHome"></div>
      `;
      mainEl.innerHTML = html;
      const grid = document.getElementById('productsGridHome');
      if (grid) {
        grid.innerHTML = products.slice(0, 4).map(p => renderProductCard(p)).join('');
        attachAddToCartListeners(grid);
      }
    }

    function renderCatalog() {
      let html = `
        <div class="categories-section" id="categoryFilters">
          ${categories.map(cat => `<button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">${cat.name}</button>`).join('')}
        </div>
        <div class="products-grid" id="productsGridCatalog"></div>
        <div class="pagination">
          <button class="pagination-btn"><i class="fas fa-chevron-left"></i></button>
          <span style="align-self:center; margin:0 10px;">1/1</span>
          <button class="pagination-btn"><i class="fas fa-chevron-right"></i></button>
        </div>
      `;
      mainEl.innerHTML = html;
      filterAndRenderProducts();

      // обработчики категорий
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          currentCategory = e.target.dataset.cat;
          renderCatalog(); // перерендер каталога с активной категорией
        });
      });
    }

    function filterAndRenderProducts() {
      const grid = document.getElementById('productsGridCatalog');
      if (!grid) return;
      let filtered = products;
      if (currentCategory !== 'all') {
        filtered = filtered.filter(p => p.category === currentCategory);
      }
      if (searchQuery.trim() !== '') {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      }
      grid.innerHTML = filtered.map(p => renderProductCard(p)).join('');
      attachAddToCartListeners(grid);
    }

    function renderAbout() {
      mainEl.innerHTML = `
        <div class="glass-card" style="padding: 40px; max-width: 800px; margin: 30px auto;">
          <h2 style="color: var(--primary-dark);"><i class="fas fa-heart" style="color:#276fdb;"></i> О маркетплейсе Тимофеевка</h2>
          <p style="margin-top: 24px; font-size: 1.2rem; line-height:1.6;">Мы объединяем фермеров и покупателей. Стеклянный дизайн, честные цены. Глубокие прятки — наш фирменный цвет.</p>
          <p>📍 доставка по всей области</p>
          <p>🌿 только натуральное</p>
          <p><i class="fas fa-truck"></i> бесплатно от 1500₽</p>
        </div>
      `;
    }

    function renderProductCard(p) {
      return `<div class="product-card" data-id="${p.id}">
        <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
        <div class="product-title">${p.name}</div>
        <div class="product-price">${p.price} <small>₽/кг</small></div>
        <button class="add-to-cart-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-img="${p.img}"><i class="fas fa-cart-plus"></i> В корзину</button>
      </div>`;
    }

    function attachAddToCartListeners(container) {
      container.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = +btn.dataset.id;
          const name = btn.dataset.name;
          const price = +btn.dataset.price;
          const img = btn.dataset.img;
          addToCart({ id, name, price, img });
        });
      });
    }

    // ----- Корзина -----
    function addToCart(product) {
      const existing = cart.find(item => item.id === product.id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      saveCart();
      renderCartSidebar();
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      saveCart();
      renderCartSidebar();
    }

    function saveCart() {
      localStorage.setItem('timofeevka_cart', JSON.stringify(cart));
      updateCartCounter();
    }

    function updateCartCounter() {
      const totalItems = cart.reduce((acc, i) => acc + i.quantity, 0);
      cartCounter.innerText = totalItems;
    }

    function renderCartSidebar() {
      if (!cartItemsList) return;
      if (cart.length === 0) {
        cartItemsList.innerHTML = '<div style="text-align:center; opacity:0.7;">Корзина пуста</div>';
        cartTotalSpan.innerText = `0 ₽`;
        return;
      }
      let html = '';
      let total = 0;
      cart.forEach(item => {
        total += item.price * item.quantity;
        html += `<li class="cart-item">
          <img src="${item.img}" alt="${item.name}">
          <div class="cart-item-info">
            <div class="cart-item-title">${item.name}</div>
            <div class="cart-item-price">${item.price} ₽ x ${item.quantity}</div>
          </div>
          <button class="cart-item-remove" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button>
        </li>`;
      });
      cartItemsList.innerHTML = html;
      cartTotalSpan.innerText = `${total} ₽`;
      cartItemsList.querySelectorAll('.cart-item-remove').forEach(btn => {
        btn.addEventListener('click', () => removeFromCart(+btn.dataset.id));
      });
    }

    // ----- Поиск -----
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      if (currentPage === 'catalog') {
        filterAndRenderProducts();
      } // на других страницах просто сохраняем строку
    });

    // ----- Навигация страниц -----
    function setPage(page) {
      currentPage = page;
      navPageBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === page);
      });
      renderPage();
    }

    window.app = { setPage };

    navPageBtns.forEach(btn => {
      btn.addEventListener('click', () => setPage(btn.dataset.page));
    });

    // ----- Корзина открыть/закрыть -----
    cartToggleBtn.addEventListener('click', () => {
      cartOverlay.classList.add('active');
      renderCartSidebar();
    });
    closeCartBtn.addEventListener('click', () => {
      cartOverlay.classList.remove('active');
    });
    cartOverlay.addEventListener('click', (e) => {
      if (e.target === cartOverlay) cartOverlay.classList.remove('active');
    });

    // Чек-аут
    document.getElementById('checkoutBtn')?.addEventListener('click', () => {
      alert('Спасибо за заказ! (функционал демо)');
    });

    // Инициализация
    renderPage();
    renderCartSidebar();
    updateCartCounter();

    // PWA: регистрация сервис-воркера (имитация)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW не зарегистрирован (демо)'));
    }
    // Добавим динамический манифест (в head уже есть ссылка)
    const manifestBlob = {
      name: "Тимофеевка Market",
      short_name: "Тимофеевка",
      start_url: ".",
      display: "standalone",
      background_color: "#276fdb",
      theme_color: "#276fdb",
      icons: [{ src: "https://via.placeholder.com/192x192/276fdb/ffffff?text=Т", sizes: "192x192", type: "image/png" }]
    };
    const manifestString = JSON.stringify(manifestBlob);
    const manifestBlobUrl = 'data:application/manifest+json,' + encodeURIComponent(manifestString);
    document.querySelector('link[rel="manifest"]').setAttribute('href', manifestBlobUrl);
  })();
</script>
<!-- PWA service worker регистрация дополнительно -->
<script>
  // простая заглушка service worker (можно сохранить как sw.js, но в рамках одного файла имитируем)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    // в демо не регистрируем настоящий, только имитация PWA возможностей.
  }
</script>
</body>
