        formatted = formatted.replace(/рс с ЛЕ; тор Ле; leW/gi, '<span class="spoiler">🎬 ' + '$&' + '</span>');

        if (text.toLowerCase().includes("реакции") && text.includes("t.me/MinecraftWithTimosha/1267")) {
            formatted = '<span class="highlight">❤️‍🔥 ВАЖНО: реакции на пост!</span><br>' + formatted;
        }
        // розыгрыш выделяем
        if (text.includes("Розыгрыш ПРЕФИКСА") || text.includes("розыгрыш") && text.includes("префикс")) {
            formatted = '<div class="giveaway">🎁🎲 РОЗЫГРЫШ! 🎲🎁<br>' + formatted + '</div>';
        }
        // выделяем команды для бота
        if (text.includes("/cards") || text.includes("Лололошка")) {
            formatted = formatted + ' <span style="background:#2d3a4e; border-radius:12px; padding:2px 8px;">🎴 карточная игра</span>';
        }
        // украшательство для шортс
        if (text.includes("youtube.com/shorts")) {
            formatted = formatted + ' <span style="font-size:0.7rem;">📱 #Shorts</span>';
        }
        // для анекдота
        if (text.includes("#анекдот")) {
            formatted = '<span style="font-style:italic;">😂 ' + formatted + '</span>';
        }
        return formatted;
    }

    function renderMessages() {
        const container = document.getElementById('messageFeed');
        if (!container) return;
        let html = '';
        for (let msg of rawMessages) {
            if (msg.text === undefined || (msg.text.trim() === "" && msg.date.includes("16:09") && msg.text === "")) {
                // сохраним пустое как особое
                if (msg.date === "08.04.2026 16:09" && msg.text === "") {
                    html += `<div class="message"><div class="message-header"><span class="sender">🐾 База Тимошки</span><span class="date">${msg.date}</span></div><div class="message-text"><i>🌫️ тишина...</i></div></div>`;
                    continue;
                } else if (msg.text === "" && msg.date !== "08.04.2026 16:09") {
                    continue;
                }
            }
            let displayText = msg.text;
            if (displayText === "Ы") displayText = "😶 Ы";
            const formattedContent = formatMessageText(displayText);
            html += `
                <div class="message">
                    <div class="message-header">
                        <span class="sender">📢 База Тимошки</span>
                        <span class="date">${msg.date}</span>
                    </div>
                    <div class="message-text">
                        ${formattedContent}
                    </div>
                </div>
            `;
        }
        // добавим особый блок с напоминанием о розыгрыше в конце
        html += `<div class="message" style="background: #2d2a3a; border-left-color: #ec489a;">
                    <div class="message-header"><span class="sender">🎲 АКТУАЛЬНОЕ</span><span class="date">до 17.04</span></div>
                    <div class="message-text">
                        <div class="giveaway" style="margin:0;">🔥 <strong>РОЗЫГРЫШ ПРЕФИКСА</strong> ещё идёт!<br>
                        ➕ Подпишись на <a href="https://t.me/MinecraftWithTimosha" target="_blank">канал</a> и будь в <a href="https://t.me/MinecraftGroupTimosha" target="_blank">группе</a><br>
                        📍 Поставь ❤️ на пост: <a href="https://t.me/MinecraftWithTimosha/1267" target="_blank">тык</a><br>
                        🎁 Итоги 17 апреля в 10:00! Успей!
                        </div>
                    </div>
                </div>`;
        container.innerHTML = html;
    }

    renderMessages();
</script>
