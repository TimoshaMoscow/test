            [0x2900, 0x297F],  // Supplemental Arrows-B
            [0x2980, 0x29FF],  // Miscellaneous Mathematical Symbols-B
            [0x2A00, 0x2AFF],  // Supplemental Mathematical Operators
            [0x2B00, 0x2BFF],  // Miscellaneous Symbols and Arrows
            [0x2C00, 0x2C5F],  // Glagolitic
            [0x2C60, 0x2C7F],  // Latin Extended-C
            [0x2C80, 0x2CFF],  // Coptic
            [0x2D00, 0x2D2F],  // Georgian Supplement
            [0x2D30, 0x2D7F],  // Tifinagh
            [0x2D80, 0x2DDF],  // Ethiopic Extended
            [0x2E00, 0x2E7F],  // Supplemental Punctuation
            [0x2E80, 0x2EFF],  // CJK Radicals Supplement
            [0x2F00, 0x2FDF],  // Kangxi Radicals
            [0x2FF0, 0x2FFF],  // Ideographic Description Characters
            [0x3000, 0x303F],  // CJK Symbols and Punctuation
            [0x3040, 0x309F],  // Hiragana
            [0x30A0, 0x30FF],  // Katakana
            [0x3100, 0x312F],  // Bopomofo
            [0x3130, 0x318F],  // Hangul Compatibility Jamo
            [0x3190, 0x319F],  // Kanbun
            [0x31A0, 0x31BF],  // Bopomofo Extended
            [0x31C0, 0x31EF],  // CJK Strokes
            [0x31F0, 0x31FF],  // Katakana Phonetic Extensions
            [0x3200, 0x32FF],  // Enclosed CJK Letters and Months
            [0x3300, 0x33FF],  // CJK Compatibility
            [0x3400, 0x4DBF],  // CJK Unified Ideographs Extension A (тысячи иероглифов)
            [0x4DC0, 0x4DFF],  // Yijing Hexagram Symbols
            [0x4E00, 0x9FFF],  // CJK Unified Ideographs (основной блок > 20k)
            [0xA000, 0xA48F],  // Yi Syllables
            [0xA490, 0xA4CF],  // Yi Radicals
            [0xA4D0, 0xA4FF],  // Lisu
            [0xA500, 0xA63F],  // Vai
            [0xA640, 0xA69F],  // Cyrillic Extended-B
            [0xA6A0, 0xA6FF],  // Bamum
            [0xA700, 0xA71F],  // Modifier Tone Letters
            [0xA720, 0xA7FF],  // Latin Extended-D
            [0xA800, 0xA82F],  // Syloti Nagri
            [0xA830, 0xA83F],  // Common Indic Number Forms
            [0xA840, 0xA87F],  // Phags-pa
            [0xA880, 0xA8DF],  // Saurashtra
            [0xA8E0, 0xA8FF],  // Devanagari Extended
            [0xA900, 0xA92F],  // Kayah Li
            [0xA930, 0xA95F],  // Rejang
            [0xA960, 0xA97F],  // Hangul Jamo Extended-A
            [0xA980, 0xA9DF],  // Javanese
            [0xAA00, 0xAA5F],  // Cham
            [0xAA60, 0xAA7F],  // Myanmar Extended-A
            [0xAA80, 0xAADF],  // Tai Viet
            [0xAB00, 0xAB2F],  // Ethiopic Extended-A
            [0xAB30, 0xAB6F],  // Latin Extended-E
            [0xAC00, 0xD7AF],  // Hangul Syllables (огромный блок ~11172 символов)
            [0xF900, 0xFAFF],  // CJK Compatibility Ideographs
            [0xFB00, 0xFB4F],  // Alphabetic Presentation Forms
            [0xFB50, 0xFDFF],  // Arabic Presentation Forms-A
            [0xFE00, 0xFE0F],  // Variation Selectors
            [0xFE10, 0xFE1F],  // Vertical Forms
            [0xFE20, 0xFE2F],  // Combining Half Marks
            [0xFE30, 0xFE4F],  // CJK Compatibility Forms
            [0xFE50, 0xFE6F],  // Small Form Variants
            [0xFE70, 0xFEFF],  // Arabic Presentation Forms-B
            [0xFF00, 0xFFEF],  // Halfwidth and Fullwidth Forms
            [0x10000, 0x1007F], // Linear B Syllabary
            [0x10100, 0x1013F], // Aegean Numbers
            [0x1D400, 0x1D7FF] // Mathematical Alphanumeric Symbols
        ];
        
        for (let [start, end] of ranges) {
            for (let cp = start; cp <= end; cp++) {
                // пропускаем невалидные суррогаты в одиночку, но для простоты добавим всё, что входит в базовую плоскость (кроме суррогатных пар)
                if ((cp >= 0xD800 && cp <= 0xDFFF)) continue;
                try {
                    const char = String.fromCodePoint(cp);
                    if (char && char.length > 0 && !/[\u0000-\u001F\u007F]/.test(char) || cp>=0x00A0) {
                        symbols.push(char);
                    }
                } catch(e) {}
            }
        }
        
        // 3) добавим массив basicEmojis + флаги которые уже почти все (около 3k)
        for(let em of basicEmojis) symbols.push(em);
        
        // Дополнительно спецсимволы вроде © ® ™ § ¶ • … и прочие которые уже вошли в диапазоны, но гарантируем наличие популярных
        const extraSpecials = ["©","®","™","§","¶","•","…","‰","′","″","‹","›","«","»","„","“","”","•","◦","✓","✔","✖","✗","✘","❤","★","☆","☀","☁","⚡","🔥","💧","❄️","⭐","〰️","†","‡","↔","↕","↖","↗","↘","↙","◀","▶","▲","▼","◆","◇","○","●","□","■","△","▽","♠","♣","♥","♦","♨","♪","♫","☎","⌘","⌛","⏳","⌚","⏰","⬅","➡","⬆","⬇"];
        for(let sp of extraSpecials) symbols.push(sp);
        
        // удалим дубликаты (сохраняем уникальный порядок)
        const uniqueSymbols = [...new Map(symbols.map(s => [s, s])).values()];
        console.log(`Сгенерировано символов: ${uniqueSymbols.length}`);
        return uniqueSymbols;
    }
    
    let masterSymbols = [];
    let filteredSymbols = [];
    let currentCategory = "all";
    let searchTerm = "";
    
    // DOM элементы
    const container = document.getElementById("symbolsContainer");
    const searchInput = document.getElementById("searchInput");
    const statsSpan = document.getElementById("statsDisplay");
    const filterBtns = document.querySelectorAll(".filter-btn");
    const toastEl = document.getElementById("toast");
    
    function showToast(msg) {
        toastEl.innerText = msg || "✓ Скопировано!";
        toastEl.style.opacity = "1";
        setTimeout(() => toastEl.style.opacity = "0", 1500);
    }
    
    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            showToast(`Скопировано: ${text.length > 10 ? text.slice(0,6)+'…' : text}`);
        } catch(e) {
            alert("Не удалось скопировать, выделите вручную");
        }
    }
    
    function getCategory(char) {
        const emojiRegex = /[\p{Emoji}]/u;
        if (emojiRegex.test(char)) return "emoji";
        const specialRegex = /[©®™℗§¶†‡•…‰′″‹›«»“”„‰€¥£¢₽₹₩₴₪₫฿₡₠₢₣₤₧₨₮₯₰₱₲₳₴₵₶₷₸₹]/u;
        if (specialRegex.test(char)) return "special";
        return "unicode";
    }
    
    function filterSymbols() {
        let temp = masterSymbols;
        if (currentCategory !== "all") {
            temp = temp.filter(sym => getCategory(sym) === currentCategory);
        }
        if (searchTerm.trim() !== "") {
            const term = searchTerm.trim().toLowerCase();
            temp = temp.filter(sym => sym.toLowerCase().includes(term) || sym === term);
        }
        filteredSymbols = temp;
        statsSpan.innerText = `📋 ${filteredSymbols.length} символов (всего ${masterSymbols.length})`;
        renderSymbols();
    }
    
    function renderSymbols() {
        if (!filteredSymbols.length) {
            container.innerHTML = `<div class="error-zone" style="grid-column:1/-1;">😕 Ничего не найдено. Попробуйте другой запрос или сбросьте фильтр.</div>`;
            return;
        }
        const fragment = document.createDocumentFragment();
        for (let sym of filteredSymbols.slice(0, 5000)) { // для производительности показываем первые 5000, при поиске/фильтрации можно пагинацию, но достаточно быстро
            const card = document.createElement("div");
            card.className = "symbol-card";
            card.setAttribute("data-char", sym);
            const charSpan = document.createElement("div");
            charSpan.className = "symbol-char";
            charSpan.innerText = sym;
            const nameSpan = document.createElement("div");
            nameSpan.className = "symbol-name";
            let code = sym.codePointAt(0)?.toString(16).toUpperCase() || "???";
            nameSpan.innerText = `U+${code}`;
            card.appendChild(charSpan);
            card.appendChild(nameSpan);
            card.addEventListener("click", (e) => {
                e.stopPropagation();
                copyToClipboard(sym);
            });
            fragment.appendChild(card);
        }
        container.innerHTML = "";
        container.appendChild(fragment);
        if(filteredSymbols.length > 5000) {
            const more = document.createElement("div");
            more.className = "stats";
            more.style.gridColumn = "1/-1";
            more.innerText = `+ ещё ${filteredSymbols.length-5000} символов (лимит показа 5000, поиск работает по всем)`;
            container.appendChild(more);
        }
    }
    
    function initSymbols() {
        container.innerHTML = '<div class="loader">🚀 Генерация библиотеки из 100 000+ символов...</div>';
        setTimeout(() => {
            masterSymbols = generateHugeUnicodeSet();
            filterSymbols();
        }, 50);
    }
    
    // google auth (Client ID)
    const YOUR_CLIENT_ID = '22364952672-8mqiqmo14pgq3es9thb2bhon1eiqq522.apps.googleusercontent.com';
    let googleUser = null;
    function handleGoogleSignIn() {
        if(window.google?.accounts?.id) {
            google.accounts.id.initialize({
                client_id: YOUR_CLIENT_ID,
                callback: (response) => {
                    console.log("Google user signed in", response);
                    const userDiv = document.getElementById("googleAuthSection");
                    userDiv.innerHTML = `<div class="user-info"><span>✅ Вход выполнен</span><button id="logoutBtn" class="google-btn" style="background:#eef2fa;">Выйти</button></div>`;
                    document.getElementById("logoutBtn")?.addEventListener("click", () => {
                        google.accounts.id.disableAutoSelect();
                        location.reload();
                    });
                    showToast("Добро пожаловать! Символы ждут ✨");
                }
            });
            google.accounts.id.renderButton(document.getElementById("googleSignInBtn"), { theme: "outline", size: "medium" });
            google.accounts.id.prompt();
        } else {
            console.warn("Google API не загружен");
        }
    }
    
    // загружаем Google SDK
    const script = document.createElement('script');
    script.src = "https://accounts.google.com/gsi/client";
    script.async = true;
    script.defer = true;
    script.onload = () => handleGoogleSignIn();
    document.head.appendChild(script);
    
    // события фильтров и поиска
    filterBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            filterBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.dataset.cat;
            filterSymbols();
        });
    });
    searchInput.addEventListener("input", (e) => {
        searchTerm = e.target.value;
        filterSymbols();
    });
    
    initSymbols();
</script>
</body>
