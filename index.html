<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎤 Голосовой ввод с вибр... ой.</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 28px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            word-break: break-word;
        }

        h1 span {
            background: #667eea;
            color: white;
            font-size: 16px;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .mic-container {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .mic-button {
            background: linear-gradient(145deg, #f0f0f0, #ffffff);
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #555;
            font-weight: 500;
            border: 3px solid white;
            outline: 2px solid transparent;
            outline-offset: 2px;
        }

        .mic-button:active {
            transform: scale(0.94);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2), inset 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .mic-button.listening {
            background: linear-gradient(145deg, #ff6b6b, #ff4757);
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        .mic-icon {
            font-size: 48px;
            line-height: 1;
        }

        .mic-status {
            font-size: 14px;
            opacity: 0.9;
        }

        .result-section {
            background: #f8f9ff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .label svg {
            opacity: 0.7;
        }

        .result-box {
            background: white;
            border-radius: 16px;
            padding: 20px;
            min-height: 120px;
            border: 2px solid #e0e0ff;
            margin-bottom: 20px;
            font-size: 18px;
            line-height: 1.5;
            color: #333;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .result-box.placeholder {
            color: #aaa;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1 1 auto;
            background: white;
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #444;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
            min-width: 140px;
        }

        .btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background: linear-gradient(145deg, #667eea, #5a67d8);
            color: white;
            border: none;
        }

        .btn-primary:active {
            background: #5a67d8;
        }

        .btn-success {
            background: linear-gradient(145deg, #48bb78, #38a169);
            color: white;
            border: none;
        }

        .footer-note {
            margin-top: 16px;
            font-size: 13px;
            color: #777;
            text-align: center;
        }

        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            background: #fed7d7;
            padding: 10px;
            border-radius: 40px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            🎤 Голосовой ввод с вибр... ой.
            <span>v2.0</span>
        </h1>

        <div class="mic-container">
            <button class="mic-button" id="micButton">
                <span class="mic-icon">🎙️</span>
                <span class="mic-status" id="micStatus">Начать</span>
            </button>
        </div>

        <div class="result-section">
            <div class="label">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                Распознанный текст:
            </div>
            <div class="result-box" id="resultBox">
                👆 Нажмите на микрофон и говорите
            </div>

            <div class="actions">
                <button class="btn" id="copyBtn">
                    <span>📋</span> Копировать
                </button>
                <button class="btn btn-primary" id="clearBtn">
                    <span>🗑️</span> Очистить
                </button>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="footer-note">
            ⚡ При нажатиях — вибрация (если поддерживается устройством)<br>
            🗣️ Пауза → запятая, завершение → точка
        </div>
    </div>

    <script>
        (function() {
            // Элементы DOM
            const micButton = document.getElementById('micButton');
            const micStatus = document.getElementById('micStatus');
            const resultBox = document.getElementById('resultBox');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');
            const errorMessage = document.getElementById('errorMessage');

            // Переменные для распознавания речи
            let recognition = null;
            let isListening = false;
            let finalTranscript = ''; // Хранит только чистый текст без плейсхолдера
            let isFirstStart = true; // Флаг для первого запуска

            // Проверка поддержки вибрации
            const vibrateSupported = 'vibrate' in navigator;

            // Функция вибрации (безопасный вызов)
            function vibrate(pattern) {
                if (vibrateSupported) {
                    navigator.vibrate(pattern);
                }
            }

            // Функция для добавления пунктуации по интонации
            function addPunctuationByIntent(text, isFinal) {
                if (!text) return text;
                
                text = text.trim();
                
                // Если текст пустой, возвращаем как есть
                if (text.length === 0) return text;
                
                // Проверяем последний символ
                const lastChar = text[text.length - 1];
                
                // Если последний символ уже знак препинания, не добавляем новый
                if (lastChar.match(/[.!?,:;]/)) {
                    return text;
                }
                
                // Для финальных результатов (конец предложения) добавляем точку
                if (isFinal) {
                    // Проверяем, не заканчивается ли уже на точку/вопросительный/восклицательный
                    if (!text.match(/[.!?]$/)) {
                        return text + '.';
                    }
                } else {
                    // Для промежуточных результатов с паузой добавляем запятую
                    // Но только если текст не слишком короткий и это похоже на паузу
                    // В реальности API не дает точной информации о паузах, поэтому 
                    // мы используем длительность паузы между словами, но в браузерном API 
                    // такой информации нет. Поэтому добавляем запятую только если 
                    // текст уже содержит интонационные маркеры, но для демо 
                    // будем добавлять запятую после каждого завершенного слова с паузой
                    
                    // Упрощенный подход: если промежуточный результат содержит больше 3 слов
                    // и не заканчивается знаком препинания, добавляем запятую
                    // Но чтобы не было слишком много запятых, добавим только если 
                    // последнее слово не очень короткое
                    const words = text.split(' ');
                    if (words.length > 2) {
                        const lastWord = words[words.length - 1];
                        if (lastWord.length > 2 && !text.match(/[,;:]$/)) {
                            return text + ',';
                        }
                    }
                }
                
                return text;
            }

            // Функция обновления отображения результата
            function updateResultDisplay(final, interim = '') {
                let displayText = final;
                
                if (interim) {
                    // Добавляем пунктуацию к промежуточному результату
                    const punctuatedInterim = addPunctuationByIntent(interim, false);
                    resultBox.innerHTML = final + '<em style="color:#999;">' + punctuatedInterim + '</em>';
                } else {
                    if (final) {
                        resultBox.textContent = final;
                        resultBox.classList.remove('placeholder');
                    } else {
                        resultBox.textContent = '👆 Нажмите на микрофон и говорите';
                        resultBox.classList.add('placeholder');
                    }
                }
            }

            // Функция получения чистого текста для копирования (без плейсхолдера и курсива)
            function getCleanTextForCopy() {
                // Если есть финальный текст, используем его
                if (finalTranscript && finalTranscript.trim() !== '') {
                    return finalTranscript.trim();
                }
                
                // Если в resultBox есть текст, но это не плейсхолдер
                const boxText = resultBox.textContent;
                if (boxText && boxText !== '👆 Нажмите на микрофон и говорите') {
                    return boxText.trim();
                }
                
                return '';
            }

            // Инициализация Web Speech API
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'ru-RU';
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;

                recognition.onresult = (event) => {
                    let interimTranscript = '';
                    let finalFragment = '';

                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            // Добавляем пунктуацию к финальному фрагменту
                            finalFragment = addPunctuationByIntent(transcript, true);
                            finalTranscript += finalFragment + ' ';
                        } else {
                            interimTranscript += transcript;
                        }
                    }

                    // Применяем пунктуацию к промежуточному результату
                    updateResultDisplay(finalTranscript, interimTranscript);
                };

                recognition.onerror = (event) => {
                    console.error('Ошибка распознавания:', event.error);
                    let userMessage = '';
                    switch(event.error) {
                        case 'no-speech':
                            userMessage = 'Речь не обнаружена. Попробуйте снова.';
                            break;
                        case 'audio-capture':
                            userMessage = 'Не найден микрофон. Проверьте подключение.';
                            break;
                        case 'not-allowed':
                            userMessage = 'Доступ к микрофону запрещён. Разрешите доступ.';
                            break;
                        default:
                            userMessage = 'Ошибка: ' + event.error;
                    }
                    showError(userMessage);
                    stopListening();
                };

                recognition.onend = () => {
                    if (isListening) {
                        stopListening();
                    }
                };
            } else {
                micButton.disabled = true;
                micButton.style.opacity = '0.5';
                micButton.style.cursor = 'not-allowed';
                micButton.title = 'Ваш браузер не поддерживает голосовой ввод';
                showError('Ваш браузер не поддерживает голосовой ввод. Попробуйте Chrome, Edge или Safari.');
            }

            function showError(msg) {
                errorMessage.textContent = msg;
                errorMessage.classList.add('show');
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 4000);
            }

            function startListening() {
                if (!recognition) return;

                vibrate(20);

                // Если это первый запуск или текст был плейсхолдером, начинаем с чистого листа
                if (resultBox.textContent === '👆 Нажмите на микрофон и говорите' || isFirstStart) {
                    finalTranscript = '';
                    isFirstStart = false;
                } else {
                    // Иначе сохраняем текущий текст как базу
                    finalTranscript = resultBox.textContent;
                }

                try {
                    recognition.start();
                    isListening = true;

                    micButton.classList.add('listening');
                    micStatus.textContent = 'Слушаю...';
                    resultBox.classList.remove('placeholder');

                    vibrate(30);
                } catch (e) {
                    console.error('Ошибка запуска распознавания:', e);
                    showError('Не удалось запустить микрофон');
                }
            }

            function stopListening() {
                if (!recognition) return;

                vibrate(20);

                try {
                    recognition.stop();
                } catch (e) {
                    console.error('Ошибка остановки распознавания:', e);
                }
                
                isListening = false;

                micButton.classList.remove('listening');
                micStatus.textContent = 'Начать';

                // Убираем курсивные подсказки
                if (resultBox.innerHTML.includes('<em')) {
                    resultBox.textContent = finalTranscript || '👆 Нажмите на микрофон и говорите';
                }

                if (!finalTranscript.trim()) {
                    resultBox.textContent = '👆 Нажмите на микрофон и говорите';
                    resultBox.classList.add('placeholder');
                }

                vibrate([10, 10, 10]);
            }

            micButton.addEventListener('click', () => {
                vibrate(15);

                if (!recognition) {
                    showError('Голосовой ввод не поддерживается');
                    return;
                }

                if (isListening) {
                    stopListening();
                } else {
                    startListening();
                }
            });

            copyBtn.addEventListener('click', () => {
                vibrate(20);

                const textToCopy = getCleanTextForCopy();

                if (!textToCopy) {
                    showError('Нет текста для копирования');
                    vibrate([30, 30, 30]);
                    return;
                }

                navigator.clipboard.writeText(textToCopy).then(() => {
                    const originalText = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<span>✅</span> Скопировано!';
                    copyBtn.classList.add('btn-success');
                    vibrate([20, 50, 20]);
                    setTimeout(() => {
                        copyBtn.innerHTML = '<span>📋</span> Копировать';
                        copyBtn.classList.remove('btn-success');
                    }, 2000);
                }).catch(err => {
                    console.error('Ошибка копирования:', err);
                    showError('Не удалось скопировать');
                    vibrate([30, 30, 30]);
                });
            });

            clearBtn.addEventListener('click', () => {
                vibrate(20);

                finalTranscript = '';
                resultBox.textContent = '👆 Нажмите на микрофон и говорите';
                resultBox.classList.add('placeholder');
                isFirstStart = true; // Сбрасываем флаг, чтобы при следующем старте начать с чистой

                vibrate(20);
            });

            window.addEventListener('beforeunload', () => {
                if (isListening && recognition) {
                    try {
                        recognition.stop();
                    } catch (e) {}
                }
            });

            // Инициализация
            if (resultBox.textContent === '👆 Нажмите на микрофон и говорите') {
                resultBox.classList.add('placeholder');
            }
        })();
    </script>
</body>
</html>
