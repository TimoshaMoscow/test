<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Tuber — OBS стабильная версия</title>
    <!-- Универсальный стиль: переключается между интерфейсом и чистым режимом -->
</head>
<body>
    <!-- ========== СТИЛИ ========== -->
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            background: #1a1a24;
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        /* Режим "чистый" — всё скрыто, только канвас на весь экран */
        body.clean-mode {
            background: transparent !important;
            overflow: hidden;
            padding: 0;
        }
        body.clean-mode .ui-container,
        body.clean-mode .ui-container * {
            display: none !important;
        }
        body.clean-mode #cleanCanvas {
            display: block !important;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: transparent;
        }
        /* Интерфейсный режим */
        .ui-container {
            max-width: 1000px;
            margin: 20px;
            background: rgba(30,30,40,0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border: 1px solid #5a5a8a;
        }
        h1 {
            text-align: center;
            background: linear-gradient(145deg, #c0c8ff, #d0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0;
        }
        .preview-row {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .preview-box {
            background: #252532;
            border-radius: 36px;
            padding: 20px;
            border: 1px solid #6a6a9a;
            text-align: center;
        }
        .preview-box h3 {
            color: #c6d0ff;
            margin: 0 0 15px;
        }
        .thumb {
            width: 200px;
            height: 200px;
            background: #2e2e3a;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid #5a5a88;
            margin-bottom: 15px;
        }
        .thumb img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .file-label {
            background: #4a4a7a;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-block;
            border: 1px solid #9a9ad0;
            box-shadow: 0 5px 0 #2a2a40;
            transition: 0.1s;
        }
        .file-label:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #2a2a40;
        }
        input[type="file"] { display: none; }
        .filename {
            margin-top: 10px;
            background: #1d1d2b;
            padding: 6px 15px;
            border-radius: 40px;
            color: #b4b4e0;
            font-size: 0.9rem;
        }
        .control-panel {
            background: #20202c;
            border-radius: 60px;
            padding: 20px 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            margin: 30px 0;
        }
        .link-box {
            flex: 2 1 400px;
            display: flex;
            background: #12121c;
            border-radius: 60px;
            border: 1px solid #6a6aa0;
            overflow: hidden;
        }
        .link-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 20px;
            color: white;
            font-family: monospace;
            outline: none;
        }
        .link-box button {
            background: #5d5d9a;
            border: none;
            color: white;
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            border-left: 2px solid #3a3a60;
        }
        .big-btn {
            background: #7a6aff;
            border: none;
            color: white;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 7px 0 #4a3a9a;
            transition: 0.1s;
            white-space: nowrap;
            flex: 1 0 auto;
        }
        .big-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #4a3a9a;
        }
        .status {
            background: #1e1e2c;
            border-radius: 40px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            border-left: 5px solid #8a7aff;
        }
        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4aff7a;
            box-shadow: 0 0 12px #33ff55;
        }
        .dot.muted { background: #ff4a4a; box-shadow: 0 0 12px #ff3333; }
        .warning { color: #b2b2da; }
        footer { text-align: center; color: #6a6a90; margin-top: 20px; }
        #cleanCanvas { display: none; } /* скрыт по умолчанию */
    </style>

    <!-- ========== ИНТЕРФЕЙС (ВИДЕН ТОЛЬКО В РЕЖИМЕ НАСТРОЙКИ) ========== -->
    <div class="ui-container">
        <h1>🎙️ PNG TUBER — НАСТРОЙКА</h1>
        <div class="preview-row">
            <div class="preview-box">
                <h3>😐 ЗАКРЫТЫЙ</h3>
                <div class="thumb" id="closedThumb"><span style="font-size:3rem;">🖼️</span></div>
                <label for="uploadClosed" class="file-label">Выбрать</label>
                <input type="file" id="uploadClosed" accept="image/*">
                <div id="closedFileName" class="filename">не выбрано</div>
            </div>
            <div class="preview-box">
                <h3>😲 ОТКРЫТЫЙ</h3>
                <div class="thumb" id="openThumb"><span style="font-size:3rem;">🖼️</span></div>
                <label for="uploadOpen" class="file-label">Выбрать</label>
                <input type="file" id="uploadOpen" accept="image/*">
                <div id="openFileName" class="filename">не выбрано</div>
            </div>
        </div>

        <div class="control-panel">
            <div class="link-box">
                <input type="text" id="pureLink" readonly placeholder="загрузите картинки">
                <button id="copyBtn">📋</button>
            </div>
            <button class="big-btn" id="generateBtn">✨ СГЕНЕРИРОВАТЬ ССЫЛКУ</button>
        </div>

        <div class="status">
            <span>🎤 Микрофон:</span>
            <span id="micStatus">проверка...</span>
            <span id="micDot" class="dot muted"></span>
            <span class="warning">(выберите устройство в браузере)</span>
        </div>
        <footer>⬇️ Чистая ссылка — только персонаж (для OBS)</footer>
    </div>

    <!-- ========== КАНВАС ДЛЯ ЧИСТОГО РЕЖИМА ========== -->
    <canvas id="cleanCanvas" width="800" height="600"></canvas>

    <script>
        (function() {
            // ========== ПРОВЕРКА РЕЖИМА ==========
            const urlParams = new URLSearchParams(window.location.search);
            const isCleanMode = urlParams.has('clean') && urlParams.get('clean') === '1';
            
            // Элементы интерфейса и канваса
            const uiContainer = document.querySelector('.ui-container');
            const cleanCanvas = document.getElementById('cleanCanvas');
            
            // Если чиcтый режим — включаем его и сразу инициализируем логику
            if (isCleanMode) {
                document.body.classList.add('clean-mode');
                // Скрываем интерфейс, показываем канвас
                uiContainer.style.display = 'none';
                cleanCanvas.style.display = 'block';
                
                // Запускаем чистую версию
                initCleanVersion();
            } else {
                // Обычный режим — инициализируем интерфейс
                initInterface();
            }

            // ========== ЧИСТАЯ ВЕРСИЯ (ТОЛЬКО КАНВАС И МИКРОФОН) ==========
            function initCleanVersion() {
                const canvas = cleanCanvas;
                const ctx = canvas.getContext('2d');
                
                // Переменные
                let closedImg = null;
                let openImg = null;
                let mouthOpen = false;
                let audioContext = null;
                let analyser = null;
                let source = null;
                let mediaStream = null;
                let animationFrame = null;
                
                // Загрузка картинок из hash
                function loadImagesFromHash() {
                    if (!window.location.hash) return;
                    try {
                        const hash = decodeURIComponent(window.location.hash.substring(1));
                        const data = JSON.parse(hash);
                        
                        let loadedCount = 0;
                        const total = (data.closed ? 1 : 0) + (data.open ? 1 : 0);
                        
                        if (data.closed) {
                            const img = new Image();
                            img.onload = () => {
                                closedImg = img;
                                loadedCount++;
                                if (loadedCount === total) drawCanvas();
                            };
                            img.src = data.closed;
                        }
                        if (data.open) {
                            const img = new Image();
                            img.onload = () => {
                                openImg = img;
                                loadedCount++;
                                if (loadedCount === total) drawCanvas();
                            };
                            img.src = data.open;
                        }
                    } catch (e) {
                        console.warn('Ошибка загрузки из hash:', e);
                    }
                }
                
                // Рисование с адаптацией под размер
                function drawCanvas() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Адаптируем размер canvas под окно
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    
                    const img = mouthOpen ? openImg : closedImg;
                    if (!img) return;
                    
                    const imgW = img.naturalWidth;
                    const imgH = img.naturalHeight;
                    const cw = canvas.width;
                    const ch = canvas.height;
                    
                    const imgAspect = imgW / imgH;
                    const canvasAspect = cw / ch;
                    
                    let drawW, drawH, offsetX = 0, offsetY = 0;
                    
                    if (imgAspect > canvasAspect) {
                        drawH = ch;
                        drawW = imgW * (ch / imgH);
                        offsetX = (cw - drawW) / 2;
                    } else {
                        drawW = cw;
                        drawH = imgH * (cw / imgW);
                        offsetY = (ch - drawH) / 2;
                    }
                    
                    ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
                }
                
                // Микрофон
                async function setupMicrophone() {
                    try {
                        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                        
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        if (audioContext.state === 'suspended') {
                            await audioContext.resume();
                        }
                        
                        analyser = audioContext.createAnalyser();
                        analyser.fftSize = 256;
                        const bufferLength = analyser.frequencyBinCount;
                        const dataArray = new Uint8Array(bufferLength);
                        
                        source = audioContext.createMediaStreamSource(mediaStream);
                        source.connect(analyser);
                        
                        function checkVolume() {
                            if (!analyser) return;
                            analyser.getByteFrequencyData(dataArray);
                            
                            let sum = 0;
                            for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
                            const avg = sum / bufferLength;
                            
                            // Порог чувствительности
                            const threshold = 12;
                            const newMouthState = avg > threshold;
                            
                            if (newMouthState !== mouthOpen) {
                                mouthOpen = newMouthState;
                                drawCanvas();
                            }
                            
                            animationFrame = requestAnimationFrame(checkVolume);
                        }
                        
                        checkVolume();
                    } catch (err) {
                        console.warn('Микрофон не доступен:', err);
                        // работаем без звука
                    }
                }
                
                // Обработка ресайза
                window.addEventListener('resize', () => {
                    drawCanvas();
                });
                
                // Старт
                loadImagesFromHash();
                setupMicrophone();
                
                // Если картинок нет — рисуем пустой холст
                setTimeout(() => {
                    if (!closedImg && !openImg) drawCanvas();
                }, 500);
                
                // Возобновление аудиоконтекста по клику (для безопасности)
                document.addEventListener('click', () => {
                    if (audioContext && audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                });
            }

            // ========== ИНТЕРФЕЙС (ОБЫЧНЫЙ РЕЖИМ) ==========
            function initInterface() {
                // Элементы
                const uploadClosed = document.getElementById('uploadClosed');
                const uploadOpen = document.getElementById('uploadOpen');
                const closedFileName = document.getElementById('closedFileName');
                const openFileName = document.getElementById('openFileName');
                const closedThumb = document.getElementById('closedThumb');
                const openThumb = document.getElementById('openThumb');
                const pureLinkInput = document.getElementById('pureLink');
                const generateBtn = document.getElementById('generateBtn');
                const copyBtn = document.getElementById('copyBtn');
                const micStatus = document.getElementById('micStatus');
                const micDot = document.getElementById('micDot');
                
                let closedImageData = null;
                let openImageData = null;
                
                // Обновление превью
                function updateThumb(element, dataUrl) {
                    element.innerHTML = '';
                    if (dataUrl) {
                        const img = document.createElement('img');
                        img.src = dataUrl;
                        element.appendChild(img);
                    } else {
                        element.innerHTML = '<span style="font-size:3rem;">🖼️</span>';
                    }
                }
                
                uploadClosed.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        closedImageData = ev.target.result;
                        closedFileName.textContent = file.name.length > 30 ? file.name.slice(0,27)+'…' : file.name;
                        updateThumb(closedThumb, closedImageData);
                    };
                    reader.readAsDataURL(file);
                });
                
                uploadOpen.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        openImageData = ev.target.result;
                        openFileName.textContent = file.name.length > 30 ? file.name.slice(0,27)+'…' : file.name;
                        updateThumb(openThumb, openImageData);
                    };
                    reader.readAsDataURL(file);
                });
                
                // Генерация чистой ссылки
                generateBtn.addEventListener('click', () => {
                    if (!closedImageData && !openImageData) {
                        alert('Загрузите хотя бы одну картинку');
                        return;
                    }
                    
                    const dataObject = {
                        closed: closedImageData || '',
                        open: openImageData || ''
                    };
                    
                    const jsonStr = JSON.stringify(dataObject);
                    const encoded = encodeURIComponent(jsonStr);
                    
                    const baseUrl = window.location.href.split('#')[0].split('?')[0];
                    const pureUrl = baseUrl + '?clean=1#' + encoded;
                    
                    pureLinkInput.value = pureUrl;
                });
                
                copyBtn.addEventListener('click', () => {
                    if (pureLinkInput.value) {
                        navigator.clipboard.writeText(pureLinkInput.value)
                            .then(() => alert('✅ Скопировано'))
                            .catch(() => alert('❌ Ошибка'));
                    } else {
                        alert('Сначала сгенерируйте ссылку');
                    }
                });
                
                // Микрофон в интерфейсе (только индикация)
                async function setupInterfaceMic() {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        const context = new (window.AudioContext || window.webkitAudioContext)();
                        if (context.state === 'suspended') await context.resume();
                        
                        const analyser = context.createAnalyser();
                        analyser.fftSize = 256;
                        const dataArray = new Uint8Array(analyser.frequencyBinCount);
                        
                        const source = context.createMediaStreamSource(stream);
                        source.connect(analyser);
                        
                        micStatus.textContent = 'активен';
                        micDot.classList.remove('muted');
                        
                        function check() {
                            analyser.getByteFrequencyData(dataArray);
                            let sum = 0;
                            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                            const avg = sum / dataArray.length;
                            
                            if (avg > 10) {
                                micDot.style.background = '#4aff7a';
                                micDot.style.boxShadow = '0 0 16px #33ff55';
                            } else {
                                micDot.style.background = '#ff4a4a';
                                micDot.style.boxShadow = '0 0 12px #ff3333';
                            }
                            requestAnimationFrame(check);
                        }
                        check();
                    } catch {
                        micStatus.textContent = 'нет доступа';
                        micDot.classList.add('muted');
                    }
                }
                setupInterfaceMic();
            }
        })();
    </script>
</body>
</html>
