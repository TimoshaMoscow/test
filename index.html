<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Tuber для OBS</title>
    <style>
        /* Базовые сбросы */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Стили для режима интерфейса */
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #1a1a24;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        /* Контейнер интерфейса */
        .ui-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(35, 35, 45, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #5a5a8a;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #b0b0ff, #d090ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Блоки загрузки */
        .upload-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .upload-card {
            background: #2a2a38;
            border-radius: 40px;
            padding: 25px;
            flex: 1 1 300px;
            border: 2px solid #4a4a6a;
            text-align: center;
        }

        .upload-card h3 {
            color: #c0c0f0;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .preview-box {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            background: #1e1e2a;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid #6a6a9a;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .preview-box .placeholder {
            font-size: 4rem;
            opacity: 0.5;
        }

        .file-input {
            display: none;
        }

        .file-label {
            display: inline-block;
            background: #4a4a7a;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            border: 1px solid #8a8ac0;
            box-shadow: 0 6px 0 #2a2a42;
            transition: 0.1s;
            margin-bottom: 15px;
        }

        .file-label:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2a2a42;
        }

        .file-name {
            color: #a0a0d0;
            font-size: 0.9rem;
            background: #1e1e2e;
            padding: 8px 15px;
            border-radius: 30px;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Панель управления */
        .control-panel {
            background: #222230;
            border-radius: 80px;
            padding: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .link-wrapper {
            flex: 3 1 400px;
            display: flex;
            background: #12121c;
            border-radius: 60px;
            border: 2px solid #6a6aa0;
            overflow: hidden;
        }

        .link-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 18px 25px;
            color: white;
            font-size: 1rem;
            font-family: monospace;
            outline: none;
        }

        .link-wrapper button {
            background: #6a6a9a;
            border: none;
            color: white;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border-left: 2px solid #44446a;
            transition: 0.1s;
        }

        .link-wrapper button:hover {
            background: #7a7aaa;
        }

        .generate-btn {
            background: #8a7aff;
            border: none;
            color: white;
            padding: 18px 45px;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #4a3a9a;
            transition: 0.1s;
            border: 1px solid #b0a0ff;
            flex: 1 0 auto;
            white-space: nowrap;
        }

        .generate-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #4a3a9a;
        }

        /* Статус микрофона */
        .mic-status {
            background: #1e1e2c;
            border-radius: 50px;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            border-left: 8px solid #8a7aff;
            color: #d0d0f0;
            font-size: 1.2rem;
        }

        .mic-indicator {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ff4a4a;
            box-shadow: 0 0 15px #ff3333;
            transition: 0.1s;
        }

        .mic-indicator.active {
            background: #4aff7a;
            box-shadow: 0 0 20px #33ff55;
        }

        .footnote {
            text-align: center;
            color: #6a6a90;
            margin-top: 30px;
            font-size: 1rem;
        }

        /* ЧИСТЫЙ РЕЖИМ ДЛЯ OBS */
        body.clean-mode {
            background: transparent;
            padding: 0;
            overflow: hidden;
        }

        body.clean-mode .ui-container {
            display: none;
        }

        #cleanCanvas {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: transparent;
        }

        body.clean-mode #cleanCanvas {
            display: block;
        }
    </style>
</head>
<body>
    <!-- ИНТЕРФЕЙС ЗАГРУЗКИ -->
    <div class="ui-container">
        <h1>🎭 PNG TUBER для OBS</h1>
        
        <div class="upload-grid">
            <!-- Карточка для закрытого рта -->
            <div class="upload-card">
                <h3>😐 Рот ЗАКРыт</h3>
                <div class="preview-box" id="closedPreview">
                    <span class="placeholder">🖼️</span>
                </div>
                <input type="file" id="closedInput" class="file-input" accept="image/png,image/jpeg,image/webp,image/gif">
                <label for="closedInput" class="file-label">Выбрать файл</label>
                <div id="closedName" class="file-name">не выбрано</div>
            </div>
            
            <!-- Карточка для открытого рта -->
            <div class="upload-card">
                <h3>😲 Рот ОТКРыт</h3>
                <div class="preview-box" id="openPreview">
                    <span class="placeholder">🖼️</span>
                </div>
                <input type="file" id="openInput" class="file-input" accept="image/png,image/jpeg,image/webp,image/gif">
                <label for="openInput" class="file-label">Выбрать файл</label>
                <div id="openName" class="file-name">не выбрано</div>
            </div>
        </div>

        <!-- Панель генерации -->
        <div class="control-panel">
            <div class="link-wrapper">
                <input type="text" id="resultLink" readonly placeholder="Сначала загрузите картинки" value="">
                <button id="copyBtn">Копировать</button>
            </div>
            <button class="generate-btn" id="generateBtn">✨ Создать ссылку для OBS</button>
        </div>

        <!-- Статус микрофона (для проверки) -->
        <div class="mic-status">
            <span>🎤 Микрофон:</span>
            <span id="micText">запрос...</span>
            <span class="mic-indicator" id="micLed"></span>
            <span>⚡ Выберите микрофон в адресной строке</span>
        </div>
        <div class="footnote">
            ↓ Скопируйте ссылку выше и вставьте её в OBS (источник "Браузер") ↓
        </div>
    </div>

    <!-- ХОЛСТ ДЛЯ ЧИСТОГО РЕЖИМА -->
    <canvas id="cleanCanvas" width="1280" height="720"></canvas>

    <script>
        (function() {
            // ========== ОПРЕДЕЛЕНИЕ РЕЖИМА ==========
            const urlParams = new URLSearchParams(window.location.search);
            const isCleanMode = urlParams.has('clean') && urlParams.get('clean') === '1';
            
            if (isCleanMode) {
                // ========== ЧИСТЫЙ РЕЖИМ (ТОЛЬКО ПЕРСОНАЖ) ==========
                document.body.classList.add('clean-mode');
                
                const canvas = document.getElementById('cleanCanvas');
                const ctx = canvas.getContext('2d');
                
                // Переменные для изображений
                let closedImage = null;
                let openImage = null;
                let currentMouthOpen = false;
                
                // Аудио переменные
                let audioContext = null;
                let analyser = null;
                let microphone = null;
                let animationId = null;
                
                // Подгон размера canvas под окно
                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    drawImage();
                }
                
                // Отрисовка текущего изображения
                function drawImage() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    const img = currentMouthOpen ? openImage : closedImage;
                    if (!img) return;
                    
                    // Рассчитываем пропорции (cover-эффект)
                    const imgW = img.naturalWidth;
                    const imgH = img.naturalHeight;
                    const canvasW = canvas.width;
                    const canvasH = canvas.height;
                    
                    const imgAspect = imgW / imgH;
                    const canvasAspect = canvasW / canvasH;
                    
                    let drawW, drawH, offsetX = 0, offsetY = 0;
                    
                    if (imgAspect > canvasAspect) {
                        // Изображение шире — подгоняем по высоте
                        drawH = canvasH;
                        drawW = imgW * (canvasH / imgH);
                        offsetX = (canvasW - drawW) / 2;
                    } else {
                        // Изображение выше — подгоняем по ширине
                        drawW = canvasW;
                        drawH = imgH * (canvasW / imgW);
                        offsetY = (canvasH - drawH) / 2;
                    }
                    
                    ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
                }
                
                // Загрузка изображений из hash
                function loadImagesFromHash() {
                    if (!window.location.hash) return;
                    
                    try {
                        const hashData = decodeURIComponent(window.location.hash.substring(1));
                        const images = JSON.parse(hashData);
                        
                        let loadedCount = 0;
                        const totalImages = (images.closed ? 1 : 0) + (images.open ? 1 : 0);
                        
                        if (totalImages === 0) return;
                        
                        if (images.closed) {
                            const img = new Image();
                            img.onload = () => {
                                closedImage = img;
                                loadedCount++;
                                if (loadedCount === totalImages) drawImage();
                            };
                            img.src = images.closed;
                        }
                        
                        if (images.open) {
                            const img = new Image();
                            img.onload = () => {
                                openImage = img;
                                loadedCount++;
                                if (loadedCount === totalImages) drawImage();
                            };
                            img.src = images.open;
                        }
                    } catch (e) {
                        console.error('Ошибка загрузки изображений:', e);
                    }
                }
                
                // Настройка микрофона
                async function setupMicrophone() {
                    try {
                        microphone = await navigator.mediaDevices.getUserMedia({ audio: true });
                        
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        await audioContext.resume();
                        
                        analyser = audioContext.createAnalyser();
                        analyser.fftSize = 256;
                        
                        const source = audioContext.createMediaStreamSource(microphone);
                        source.connect(analyser);
                        
                        const bufferLength = analyser.frequencyBinCount;
                        const dataArray = new Uint8Array(bufferLength);
                        
                        function detectSound() {
                            analyser.getByteFrequencyData(dataArray);
                            
                            // Вычисляем среднюю громкость
                            let sum = 0;
                            for (let i = 0; i < bufferLength; i++) {
                                sum += dataArray[i];
                            }
                            const average = sum / bufferLength;
                            
                            // Порог срабатывания (можно подстроить)
                            const threshold = 15;
                            const shouldBeOpen = average > threshold;
                            
                            if (shouldBeOpen !== currentMouthOpen) {
                                currentMouthOpen = shouldBeOpen;
                                drawImage();
                            }
                            
                            animationId = requestAnimationFrame(detectSound);
                        }
                        
                        detectSound();
                    } catch (err) {
                        console.warn('Микрофон не доступен:', err);
                        // Работаем без звука (рот всегда закрыт)
                    }
                }
                
                // Инициализация
                window.addEventListener('load', () => {
                    resizeCanvas();
                    loadImagesFromHash();
                    setupMicrophone();
                });
                
                window.addEventListener('resize', resizeCanvas);
                
                // Для возобновления аудио контекста
                document.addEventListener('click', () => {
                    if (audioContext && audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                });
                
            } else {
                // ========== РЕЖИМ НАСТРОЙКИ (ЗАГРУЗКА КАРТИНОК) ==========
                
                // Получаем элементы
                const closedInput = document.getElementById('closedInput');
                const openInput = document.getElementById('openInput');
                const closedPreview = document.getElementById('closedPreview');
                const openPreview = document.getElementById('openPreview');
                const closedName = document.getElementById('closedName');
                const openName = document.getElementById('openName');
                const resultLink = document.getElementById('resultLink');
                const generateBtn = document.getElementById('generateBtn');
                const copyBtn = document.getElementById('copyBtn');
                const micText = document.getElementById('micText');
                const micLed = document.getElementById('micLed');
                
                // Хранилище для изображений в base64
                let closedImageData = null;
                let openImageData = null;
                
                // Функция обновления превью
                function updatePreview(element, dataUrl) {
                    element.innerHTML = '';
                    if (dataUrl) {
                        const img = document.createElement('img');
                        img.src = dataUrl;
                        element.appendChild(img);
                    } else {
                        element.innerHTML = '<span class="placeholder">🖼️</span>';
                    }
                }
                
                // Обработчики загрузки
                closedInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        closedImageData = ev.target.result;
                        closedName.textContent = file.name.length > 30 ? file.name.slice(0,27) + '…' : file.name;
                        updatePreview(closedPreview, closedImageData);
                    };
                    reader.readAsDataURL(file);
                });
                
                openInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        openImageData = ev.target.result;
                        openName.textContent = file.name.length > 30 ? file.name.slice(0,27) + '…' : file.name;
                        updatePreview(openPreview, openImageData);
                    };
                    reader.readAsDataURL(file);
                });
                
                // Генерация ссылки
                generateBtn.addEventListener('click', () => {
                    if (!closedImageData && !openImageData) {
                        alert('Загрузите хотя бы одну картинку!');
                        return;
                    }
                    
                    const imagesObject = {
                        closed: closedImageData || '',
                        open: openImageData || ''
                    };
                    
                    const jsonString = JSON.stringify(imagesObject);
                    const encoded = encodeURIComponent(jsonString);
                    
                    // Получаем текущий URL без параметров и хэша
                    const baseUrl = window.location.href.split('?')[0].split('#')[0];
                    const cleanUrl = baseUrl + '?clean=1#' + encoded;
                    
                    resultLink.value = cleanUrl;
                });
                
                // Копирование ссылки
                copyBtn.addEventListener('click', () => {
                    if (resultLink.value) {
                        navigator.clipboard.writeText(resultLink.value)
                            .then(() => alert('✅ Ссылка скопирована!'))
                            .catch(() => alert('❌ Не удалось скопировать'));
                    } else {
                        alert('Сначала сгенерируйте ссылку');
                    }
                });
                
                // Индикация микрофона в интерфейсе
                async function setupMicIndicator() {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        const context = new (window.AudioContext || window.webkitAudioContext)();
                        await context.resume();
                        
                        const analyser = context.createAnalyser();
                        analyser.fftSize = 256;
                        
                        const source = context.createMediaStreamSource(stream);
                        source.connect(analyser);
                        
                        const dataArray = new Uint8Array(analyser.frequencyBinCount);
                        
                        micText.textContent = 'активен';
                        
                        function updateIndicator() {
                            analyser.getByteFrequencyData(dataArray);
                            let sum = 0;
                            for (let i = 0; i < dataArray.length; i++) {
                                sum += dataArray[i];
                            }
                            const avg = sum / dataArray.length;
                            
                            if (avg > 10) {
                                micLed.classList.add('active');
                            } else {
                                micLed.classList.remove('active');
                            }
                            
                            requestAnimationFrame(updateIndicator);
                        }
                        
                        updateIndicator();
                    } catch {
                        micText.textContent = 'нет доступа';
                    }
                }
                
                setupMicIndicator();
            }
        })();
    </script>
</body>
</html>
