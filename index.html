<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Голосовой ввод с вибр... ой.</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 28px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h1 span {
            background: #667eea;
            color: white;
            font-size: 16px;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .mic-container {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .mic-button {
            background: linear-gradient(145deg, #f0f0f0, #ffffff);
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #555;
            font-weight: 500;
            border: 3px solid white;
            outline: 2px solid transparent;
            outline-offset: 2px;
        }

        .mic-button:active {
            transform: scale(0.94);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2), inset 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .mic-button.listening {
            background: linear-gradient(145deg, #ff6b6b, #ff4757);
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        .mic-icon {
            font-size: 48px;
            line-height: 1;
        }

        .mic-status {
            font-size: 14px;
            opacity: 0.9;
        }

        .result-section {
            background: #f8f9ff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .label svg {
            opacity: 0.7;
        }

        .result-box {
            background: white;
            border-radius: 16px;
            padding: 20px;
            min-height: 120px;
            border: 2px solid #e0e0ff;
            margin-bottom: 20px;
            font-size: 18px;
            line-height: 1.5;
            color: #333;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .result-box.placeholder {
            color: #aaa;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1 1 auto;
            background: white;
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #444;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
            min-width: 140px;
        }

        .btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background: linear-gradient(145deg, #667eea, #5a67d8);
            color: white;
            border: none;
        }

        .btn-primary:active {
            background: #5a67d8;
        }

        .btn-success {
            background: linear-gradient(145deg, #48bb78, #38a169);
            color: white;
            border: none;
        }

        .footer-note {
            margin-top: 16px;
            font-size: 13px;
            color: #777;
            text-align: center;
        }

        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            background: #fed7d7;
            padding: 10px;
            border-radius: 40px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            🎤 Голосовой ввод с вибр... ой.
            <span>v1.0</span>
        </h1>

        <div class="mic-container">
            <button class="mic-button" id="micButton">
                <span class="mic-icon">🎙️</span>
                <span class="mic-status" id="micStatus">Начать</span>
            </button>
        </div>

        <div class="result-section">
            <div class="label">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                Распознанный текст:
            </div>
            <div class="result-box" id="resultBox">
                👆 Нажмите на микрофон и говорите
            </div>

            <div class="actions">
                <button class="btn" id="copyBtn">
                    <span>📋</span> Копировать
                </button>
                <button class="btn btn-primary" id="clearBtn">
                    <span>🗑️</span> Очистить
                </button>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="footer-note">
            ⚡ При нажатиях — вибрация (если поддерживается устройством)
        </div>
    </div>

    <script>
        (function() {
            // Элементы DOM
            const micButton = document.getElementById('micButton');
            const micStatus = document.getElementById('micStatus');
            const resultBox = document.getElementById('resultBox');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');
            const errorMessage = document.getElementById('errorMessage');

            // Переменные для распознавания речи
            let recognition = null;
            let isListening = false;
            let finalTranscript = '';

            // Проверка поддержки вибрации
            const vibrateSupported = 'vibrate' in navigator;

            // Функция вибрации (безопасный вызов)
            function vibrate(pattern) {
                if (vibrateSupported) {
                    navigator.vibrate(pattern);
                }
            }

            // Инициализация Web Speech API
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'ru-RU'; // Русский язык, можно заменить
                recognition.continuous = true; // Продолжать слушать, пока не остановим вручную
                recognition.interimResults = true; // Показывать промежуточные результаты
                recognition.maxAlternatives = 1;

                // Событие: получен результат
                recognition.onresult = (event) => {
                    let interimTranscript = '';

                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript + ' ';
                        } else {
                            interimTranscript += transcript;
                        }
                    }

                    // Отображаем финальный + промежуточный (если есть)
                    if (interimTranscript !== '') {
                        resultBox.innerHTML = finalTranscript + '<em style="color:#999;">' + interimTranscript + '</em>';
                    } else {
                        resultBox.textContent = finalTranscript || '👆 Нажмите на микрофон и говорите';
                    }

                    // Убираем класс placeholder, если есть текст
                    if (finalTranscript.trim() !== '' || interimTranscript !== '') {
                        resultBox.classList.remove('placeholder');
                    } else {
                        resultBox.classList.add('placeholder');
                    }
                };

                // Событие: ошибка
                recognition.onerror = (event) => {
                    console.error('Ошибка распознавания:', event.error);
                    let userMessage = '';
                    switch(event.error) {
                        case 'no-speech':
                            userMessage = 'Речь не обнаружена. Попробуйте снова.';
                            break;
                        case 'audio-capture':
                            userMessage = 'Не найден микрофон. Проверьте подключение.';
                            break;
                        case 'not-allowed':
                            userMessage = 'Доступ к микрофону запрещён. Разрешите доступ.';
                            break;
                        default:
                            userMessage = 'Ошибка: ' + event.error;
                    }
                    showError(userMessage);
                    stopListening();
                };

                // Событие: окончание работы (когда перестали слушать)
                recognition.onend = () => {
                    if (isListening) {
                        // Если мы ещё должны слушать, но по какой-то причине распознавание завершилось,
                        // пробуем перезапустить (например, тишина, но continuous=true должно само держать)
                        // Но по опыту, onend вызывается при ошибках или при явном stop().
                        // Здесь мы просто синхронизируем состояние кнопки.
                        stopListening();
                    }
                };
            } else {
                // Браузер не поддерживает SpeechRecognition
                micButton.disabled = true;
                micButton.style.opacity = '0.5';
                micButton.style.cursor = 'not-allowed';
                micButton.title = 'Ваш браузер не поддерживает голосовой ввод';
                showError('Ваш браузер не поддерживает голосовой ввод. Попробуйте Chrome, Edge или Safari.');
            }

            // Функция показа ошибки
            function showError(msg) {
                errorMessage.textContent = msg;
                errorMessage.classList.add('show');
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 4000);
            }

            // Функция запуска прослушивания
            function startListening() {
                if (!recognition) return;

                // Вибрация при старте
                vibrate(20);

                // Сбрасываем финальный текст, если нужно начинать заново.
                // Если нужно накапливать, закомментируйте следующую строку
                // finalTranscript = ''; // Раскомментируйте, если нужно очищать при новом старте

                finalTranscript = resultBox.textContent === '👆 Нажмите на микрофон и говорите' ? '' : resultBox.textContent;

                recognition.start();
                isListening = true;

                // Обновляем UI
                micButton.classList.add('listening');
                micStatus.textContent = 'Слушаю...';
                resultBox.classList.remove('placeholder');

                // Вибрация подтверждения (короткая)
                vibrate(30);
            }

            // Функция остановки прослушивания
            function stopListening() {
                if (!recognition) return;

                // Вибрация при остановке
                vibrate(20);

                recognition.stop();
                isListening = false;

                // Обновляем UI
                micButton.classList.remove('listening');
                micStatus.textContent = 'Начать';

                // Убираем курсивные подсказки из resultBox, если они были
                if (resultBox.innerHTML.includes('<em')) {
                    resultBox.textContent = finalTranscript || '👆 Нажмите на микрофон и говорите';
                }

                // Если текста нет, возвращаем плейсхолдер
                if (!finalTranscript.trim()) {
                    resultBox.textContent = '👆 Нажмите на микрофон и говорите';
                    resultBox.classList.add('placeholder');
                }

                // Вибрация подтверждения остановки
                vibrate([10, 10, 10]);
            }

            // Обработчик клика по кнопке микрофона
            micButton.addEventListener('click', () => {
                // Вибрация при клике (тактильный отклик)
                vibrate(15);

                if (!recognition) {
                    showError('Голосовой ввод не поддерживается');
                    return;
                }

                if (isListening) {
                    stopListening();
                } else {
                    startListening();
                }
            });

            // Кнопка копирования
            copyBtn.addEventListener('click', () => {
                // Вибрация
                vibrate(20);

                let textToCopy = resultBox.textContent;
                // Если текст - плейсхолдер, копируем пустоту или предупреждение
                if (textToCopy === '👆 Нажмите на микрофон и говорите') {
                    textToCopy = '';
                } else if (resultBox.innerHTML.includes('<em')) {
                    // Если есть промежуточный результат (курсив), берём чистый текст
                    textToCopy = finalTranscript;
                }

                if (!textToCopy.trim()) {
                    showError('Нет текста для копирования');
                    vibrate([30, 30, 30]); // тройная вибрация - ошибка
                    return;
                }

                // Копирование в буфер обмена
                navigator.clipboard.writeText(textToCopy).then(() => {
                    // Успех
                    const originalText = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<span>✅</span> Скопировано!';
                    copyBtn.classList.add('btn-success');
                    vibrate([20, 50, 20]); // успех
                    setTimeout(() => {
                        copyBtn.innerHTML = '<span>📋</span> Копировать';
                        copyBtn.classList.remove('btn-success');
                    }, 2000);
                }).catch(err => {
                    console.error('Ошибка копирования:', err);
                    showError('Не удалось скопировать');
                    vibrate([30, 30, 30]);
                });
            });

            // Кнопка очистки
            clearBtn.addEventListener('click', () => {
                // Вибрация
                vibrate(20);

                finalTranscript = '';
                resultBox.textContent = '👆 Нажмите на микрофон и говорите';
                resultBox.classList.add('placeholder');

                // Если слушаем, лучше не сбрасывать статус, но сбросим внутренний текст
                if (isListening) {
                    // Если нужно, можно остановить и начать заново, но оставим как есть.
                    // Просто очистили вывод.
                }

                // Вибрация подтверждения
                vibrate(20);
            });

            // Обработка скрытия/ухода со страницы, чтобы остановить микрофон
            window.addEventListener('beforeunload', () => {
                if (isListening && recognition) {
                    recognition.stop();
                }
            });

            // Инициализация: добавим класс placeholder если нужно
            if (resultBox.textContent === '👆 Нажмите на микрофон и говорите') {
                resultBox.classList.add('placeholder');
            }
        })();
    </script>
</body>
</html>
