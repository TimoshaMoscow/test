<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест на Тимофея · ты ли ты?</title>
    
    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="jBY-ytvwYjSY1Jn9kXCqns11_XIrfqZlssMgNCpi8t0" />
    
    <!-- Meta теги (фиксированные) -->
    <meta property="og:title" content="Тестовый лендинг">
    <meta name="description" content="Тестовый лендинг, здесь всякая фигня">
    <meta name="keywords" content="тест, тимоша, timoshamoscow, тимошамоскоу, тимоша тест, тимоша сайт">
    
    <!-- Google Identity -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="icon" href="images/logo.png" type="image/png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .test-container {
            max-width: 750px;
            width: 100%;
            background: #1e293b;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        h1 {
            font-size: 2.5rem;
            text-align: center;
            background: linear-gradient(135deg, #f87171, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .question {
            background: #0f172a;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 8px solid #fbbf24;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fbbf24;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.5rem 0;
            cursor: pointer;
            transition: 0.1s;
        }

        .option:hover {
            background: #1e293b;
            border-radius: 1rem;
            padding-left: 0.5rem;
        }

        .option input {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #fbbf24;
        }

        .option label {
            cursor: pointer;
            color: #cbd5e1;
            font-size: 1rem;
        }

        .btn {
            background: #fbbf24;
            color: #0f172a;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 3rem;
            cursor: pointer;
            width: 100%;
            margin: 1.5rem 0;
            transition: 0.1s;
        }

        .btn:hover {
            background: #f59e0b;
            transform: scale(1.02);
        }

        .result {
            background: #0f172a;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-top: 1rem;
            border: 2px solid #fbbf24;
        }

        .result h3 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #fbbf24;
        }

        .result-score {
            font-size: 3rem;
            font-weight: 800;
            margin: 1rem 0;
        }

        .answers-review {
            background: #0f172a;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }

        .answer-item {
            padding: 0.8rem;
            border-bottom: 1px solid #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .answer-item:last-child {
            border-bottom: none;
        }

        .answer-question {
            font-weight: 600;
            color: #94a3b8;
            flex: 1;
            min-width: 200px;
        }

        .answer-user {
            color: #fbbf24;
            font-weight: 500;
        }

        .answer-correct {
            color: #10b981;
            font-size: 0.9rem;
        }

        .hidden {
            display: none;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #475569;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="test-container" id="testContainer">
        <h1>ТЕСТ НА ТИМОФЕЯ</h1>
        <div class="sub">ты ли ты? 🤔</div>

        <div id="questions"></div>

        <button class="btn" id="submitBtn">УЗНАТЬ РЕЗУЛЬТАТ</button>

        <div id="result" class="result hidden"></div>

        <footer>❄️ снежок всё ещё летит · 🖕🖕🖕 РКН · 🎰</footer>
    </div>

    <script>
        // Google Client ID
        const YOUR_CLIENT_ID = '22364952672-8mqiqmo14pgq3es9thb2bhon1eiqq522.apps.googleusercontent.com';

        const questions = [
            {
                text: "Что ты ответишь, если в комментариях напишут «сухарики»?",
                options: ["ДАЧЁ ЗА СУХАРИКИ", "У МЕНЯ НЕТ СУХАРИКИ", "Игнорирую", "Снимаю шортс про сухарики"],
                correct: 0,
                scores: [10, 7, 2, 1]
            },
            {
                text: "Какая твоя любимая эмоция в чате?",
                options: ["0_0", "0______0", "00", "😱"],
                correct: 0,
                scores: [10, 8, 7, 2]
            },
            {
                text: "Что ты сделаешь с РКН?",
                options: ["Запрещу в рулетке", "Стану иноагентом", "Создам маркетплейс мер воздействия", "Пошлю нахуй"],
                correct: 3,
                scores: [5, 9, 9, 10]
            },
            {
                text: "Какой язык ты придумал?",
                options: ["Сибилевец", "Вакеатэ Мовын", "Жаёмна", "Всё перечисленное"],
                correct: 0,
                scores: [10, 1, 0, 7]
            },
            {
                text: "Что ты ответишь, если тебя назовут женщиной?",
                options: ["я иноакент", "гей", "жаёмна", "пошлю"],
                correct: 0,
                scores: [10, 9, 1, 9]
            },
            {
                text: "Какой у тебя статус в реестре иноагентов?",
                options: ["Нет номера", "№742852", "№742852, выдано Тимофею Сибилеву", "Я сам создал реестр"],
                correct: 2,
                scores: [0, 9, 10, 5]
            },
            {
                text: "Что такое «снегр»?",
                options: ["Снег + негр", "Коричневый снег (собачьи дела)", "Снеговик из снегра", "Всё перечисленное"],
                correct: 0,
                scores: [10, 7, 0, 5]
            },
            {
                text: "Какая у тебя любимая фраза Губкобобоамёбо?",
                options: ["ты сдох", "ущербник", "вы пол сменили?", "все варианты"],
                correct: 0,
                scores: [10, 0, 6, 5]
            },
            {
                text: "Что ты ответишь на вопрос «сколько тебе лет»?",
                options: ["16 лет", "3 годика", "14 февраля 2010", "родился в 2010, 16 лет"],
                correct: 0,
                scores: [10, 0, 1, 9]
            },
            {
                text: "Где находится штаб-квартира TMFMSC?",
                options: ["В Москве", "На 13-й Парковой", "В здании 300 тысяч лет", "Всё перечисленное"],
                correct: 0,
                scores: [10, 9, 9, 3]
            }
        ];

        let userAnswers = new Array(questions.length).fill(-1);
        let resultShown = false;

        function renderQuestions() {
            const container = document.getElementById('questions');
            container.innerHTML = '';
            userAnswers = new Array(questions.length).fill(-1);

            questions.forEach((q, idx) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question';
                qDiv.innerHTML = `
                    <div class="question-text">${idx+1}. ${q.text}</div>
                    <div class="options" id="q-${idx}"></div>
                `;
                container.appendChild(qDiv);

                const optionsDiv = document.getElementById(`q-${idx}`);
                q.options.forEach((opt, optIdx) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';
                    optionDiv.innerHTML = `
                        <input type="radio" name="q${idx}" value="${optIdx}" id="q${idx}_${optIdx}">
                        <label for="q${idx}_${optIdx}">${opt}</label>
                    `;
                    optionsDiv.appendChild(optionDiv);
                });

                const radios = document.querySelectorAll(`input[name="q${idx}"]`);
                radios.forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        userAnswers[idx] = parseInt(e.target.value);
                    });
                });
            });
        }

        function calculateAndShow() {
            for (let i = 0; i < userAnswers.length; i++) {
                if (userAnswers[i] === -1) {
                    alert(`Ответь на вопрос ${i+1} (${questions[i].text})`);
                    return;
                }
            }

            let totalScore = 0;
            let maxScore = 0;
            for (let i = 0; i < questions.length; i++) {
                totalScore += questions[i].scores[userAnswers[i]];
                maxScore += 10;
            }
            const percent = Math.round((totalScore / maxScore) * 100);

            let title = '';
            let desc = '';
            let emoji = '';
            let snowStatus = '';

            if (percent >= 90) {
                title = 'ТЫ — ТИМОФЕЙ';
                desc = 'Иноакент, основатель вселенной, создатель TAIPrompts, запретитель дрочки. Снежок летит, РКН в бешенстве. Ты официально в реестре под номером 742852.';
                emoji = '👑❄️';
                snowStatus = 'летит';
            } else if (percent >= 70) {
                title = 'ТЫ ПОЧТИ ТИМОФЕЙ';
                desc = 'Ты очень близок, но чего-то не хватает. Может, ты забыл про сухарики? Или перепутал 6 мая с 5 сентября? Подтяни знания, и ты станешь иноакентом.';
                emoji = '🤔❄️';
                snowStatus = 'летит';
            } else if (percent >= 50) {
                title = 'ТЫ — ПОДПИСЧИК ТИМОШКИ';
                desc = 'Ты в теме, но не до конца. Знаешь про снежок, про рулетку, но кажется, не следил за всеми релизами. Зайди в музей TMFMSC, подтянись!';
                emoji = '📺❄️';
                snowStatus = 'ещё не взлетел';
            } else if (percent >= 30) {
                title = 'ТЫ — АРИНА ВАЛЕРЬЕВНА';
                desc = '5 сентября 🤣🤣🤣🤣. Считать не умеешь, математика — 2, зато комментарии оставляешь. Ты далеко от Тимофея, но хотя бы пытаешься.';
                emoji = '🤡❄️';
                snowStatus = 'упал в сугроб';
            } else {
                title = 'ТЫ — РКН';
                desc = 'Заблокирован. Доступа к личности Тимофея нет. Попробуй ещё раз через VPN. А пока — сиди в реестре запрещённых.';
                emoji = '🚫❄️';
                snowStatus = 'запрещён';
            }

            // скрываем тест
            document.getElementById('questions').classList.add('hidden');
            document.getElementById('submitBtn').classList.add('hidden');

            // строим разбор ответов
            let answersHtml = '<div class="answers-review"><h3 style="margin-bottom: 1rem;">📋 ТВОИ ОТВЕТЫ</h3>';
            for (let i = 0; i < questions.length; i++) {
                const userChoice = userAnswers[i];
                const userText = questions[i].options[userChoice];
                const correctText = questions[i].options[questions[i].correct];
                const isCorrect = (userChoice === questions[i].correct);
                answersHtml += `
                    <div class="answer-item">
                        <div class="answer-question">${i+1}. ${questions[i].text}</div>
                        <div>
                            <span class="answer-user">Ты: ${userText}</span>
                            ${!isCorrect ? `<span class="answer-correct"> (правильно: ${correctText})</span>` : '<span class="answer-correct" style="color:#10b981;"> ✅</span>'}
                        </div>
                    </div>
                `;
            }
            answersHtml += '</div>';

            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `
                ${answersHtml}
                <div class="result-score">🎯 ${percent}%</div>
                <h3>${emoji} ${title} ${emoji}</h3>
                <p>${desc}</p>
                <div style="margin-top: 1rem; font-size: 0.9rem; color: #94a3b8;">
                    ❄️ снежок: ${snowStatus}
                </div>
                <button id="resetBtn" class="btn" style="margin-top: 1.5rem;">ПРОЙТИ ЗАНОВО</button>
            `;

            document.getElementById('resetBtn').addEventListener('click', () => {
                resultDiv.classList.add('hidden');
                document.getElementById('questions').classList.remove('hidden');
                document.getElementById('submitBtn').classList.remove('hidden');
                renderQuestions();
                resultShown = false;
            });
        }

        document.getElementById('submitBtn').addEventListener('click', calculateAndShow);

        renderQuestions();
    </script>
</body>
</html>
