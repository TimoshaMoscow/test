<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход через Google · VΛULT</title>
    
    <!-- Google Identity -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0c15;
            --bg-secondary: #121520;
            --accent-primary: #4a6cf7;
            --accent-secondary: #a855f7;
            --accent-gradient: linear-gradient(135deg, #4a6cf7, #a855f7);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(74, 108, 247, 0.2);
            --card-bg: rgba(18, 21, 32, 0.7);
            --success: #10b981;
            --glass-border: 1px solid rgba(255, 255, 255, 0.05);
            --shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Анимированный фон */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .gradient-1 {
            position: absolute;
            width: 100vmax;
            height: 100vmax;
            background: radial-gradient(circle at 30% 50%, rgba(74, 108, 247, 0.2), transparent 70%);
            top: -20vmax;
            left: -20vmax;
            animation: float 30s infinite alternate;
        }

        .gradient-2 {
            position: absolute;
            width: 100vmax;
            height: 100vmax;
            background: radial-gradient(circle at 70% 80%, rgba(168, 85, 247, 0.2), transparent 70%);
            bottom: -20vmax;
            right: -20vmax;
            animation: float 25s infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(5deg); }
        }

        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(74, 108, 247, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 108, 247, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        /* Карточка */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 3rem;
            padding: 3rem 2.5rem;
            border: var(--glass-border);
            box-shadow: var(--shadow);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        /* Логотип */
        .logo {
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-gradient);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            margin: 0 auto 1.5rem;
            transform: rotate(5deg);
            transition: transform 0.3s;
            box-shadow: 0 20px 30px -10px var(--accent-primary);
        }

        .logo-icon:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .logo h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* Контейнер для кнопки Google */
        #googleButtonContainer {
            display: flex;
            justify-content: center;
            margin: 2.5rem 0;
            min-height: 60px;
        }

        /* Разделитель */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin: 2rem 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* Фичи */
        .features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .feature {
            text-align: center;
        }

        .feature i {
            font-size: 1.2rem;
            color: var(--accent-primary);
            margin-bottom: 0.5rem;
        }

        .feature span {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: block;
        }

        /* Профиль после входа */
        .profile {
            margin: 1.5rem 0;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--accent-primary);
            margin: 0 auto 1.5rem;
            object-fit: cover;
        }

        .welcome-text h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .welcome-text p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .email-badge {
            background: rgba(74, 108, 247, 0.1);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            border: 1px solid var(--border-color);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            margin: 1.5rem 0;
        }

        .email-badge i {
            color: var(--accent-primary);
        }

        .logout-btn {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            border-radius: 40px;
            padding: 0.8rem 2rem;
            color: #ffa0a0;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .logout-btn:hover {
            background: rgba(255, 80, 80, 0.2);
            border-color: #ff6b6b;
            transform: translateY(-2px);
        }

        /* Заглушка */
        .placeholder {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2rem;
            padding: 2rem;
            margin: 2rem 0;
            border: 1px dashed var(--border-color);
        }

        .placeholder i {
            font-size: 2rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .placeholder h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .placeholder p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .placeholder-grid {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .placeholder-item {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        /* Утилиты */
        .hidden {
            display: none !important;
        }

        .status {
            margin-top: 1.5rem;
            padding: 0.8rem;
            border-radius: 40px;
            background: rgba(74, 108, 247, 0.1);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .status i {
            color: var(--success);
            margin-right: 0.5rem;
        }

        /* Анимация загрузки */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(74, 108, 247, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="gradient-1"></div>
        <div class="gradient-2"></div>
        <div class="grid"></div>
    </div>

    <div class="container">
        <!-- Карточка входа -->
        <div id="loginCard" class="card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <h1>VΛULT</h1>
                <p>SECURE SPACE</p>
            </div>

            <div id="googleButtonContainer"></div>

            <div class="divider">
                <div class="divider-line"></div>
                <span>Безопасный вход</span>
                <div class="divider-line"></div>
            </div>

            <div class="features">
                <div class="feature">
                    <i class="fas fa-shield-halved"></i>
                    <span>Защита Google</span>
                </div>
                <div class="feature">
                    <i class="fas fa-bolt"></i>
                    <span>Мгновенно</span>
                </div>
                <div class="feature">
                    <i class="fas fa-lock"></i>
                    <span>Приватно</span>
                </div>
            </div>

            <div class="status">
                <i class="fas fa-circle"></i>
                <span>Ожидание авторизации</span>
            </div>
        </div>

        <!-- Карточка после входа (заглушка) -->
        <div id="welcomeCard" class="card hidden">
            <div class="profile">
                <img class="avatar" id="userAvatar" src="https://www.gstatic.com/images/icons/material/system/1x/account_circle_black_48dp.png" alt="avatar">
                
                <div class="welcome-text">
                    <h2 id="welcomeMessage">Добро пожаловать!</h2>
                    <p id="userName">Загрузка...</p>
                </div>

                <div class="email-badge">
                    <i class="fas fa-envelope"></i>
                    <span id="userEmail">email@example.com</span>
                </div>

                <!-- Заглушка -->
                <div class="placeholder">
                    <i class="fas fa-cubes"></i>
                    <h3>Здесь будет контент</h3>
                    <p>Страница в разработке · Скоро появится много интересного</p>
                    
                    <div class="placeholder-grid">
                        <div class="placeholder-item"><i class="fas fa-chart-line"></i></div>
                        <div class="placeholder-item"><i class="fas fa-tasks"></i></div>
                        <div class="placeholder-item"><i class="fas fa-calendar"></i></div>
                        <div class="placeholder-item"><i class="fas fa-pen"></i></div>
                    </div>
                </div>

                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    Выйти
                </button>
            </div>
        </div>
    </div>

    <script>
        // ========== КОНФИГ ==========
        const YOUR_CLIENT_ID = '22364952672-8mqiqmo14pgq3es9thb2bhon1eiqq522.apps.googleusercontent.com';
        
        // ========== СОСТОЯНИЕ ==========
        let currentUser = null;

        // ========== DOM ЭЛЕМЕНТЫ ==========
        const loginCard = document.getElementById('loginCard');
        const welcomeCard = document.getElementById('welcomeCard');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const logoutBtn = document.getElementById('logoutBtn');

        // ========== GOOGLE AUTH ==========
        function initGoogle() {
            if (!window.google) {
                setTimeout(initGoogle, 100);
                return;
            }

            google.accounts.id.initialize({
                client_id: YOUR_CLIENT_ID,
                callback: handleCredentialResponse,
                auto_select: true,
                cancel_on_tap_outside: true,
                context: 'signin',
                ux_mode: 'popup'
            });

            google.accounts.id.renderButton(
                document.getElementById('googleButtonContainer'),
                { 
                    theme: 'filled_blue', 
                    size: 'large', 
                    text: 'signin_with',
                    shape: 'pill',
                    width: 280,
                    logo_alignment: 'center'
                }
            );

            // Показываем One Tap если пользователь уже входил
            google.accounts.id.prompt();
        }

        function handleCredentialResponse(response) {
            const userData = decodeJWT(response.credential);
            if (userData) {
                currentUser = {
                    name: userData.name,
                    email: userData.email,
                    picture: userData.picture,
                    sub: userData.sub
                };
                
                localStorage.setItem('vault_user', JSON.stringify(currentUser));
                showWelcomeCard();
            }
        }

        function decodeJWT(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => 
                    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                ).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error('Ошибка декодирования JWT', e);
                return null;
            }
        }

        // ========== ВОССТАНОВЛЕНИЕ СЕССИИ ==========
        function restoreSession() {
            const saved = localStorage.getItem('vault_user');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    showWelcomeCard();
                    return true;
                } catch (e) {
                    localStorage.removeItem('vault_user');
                }
            }
            return false;
        }

        // ========== ПОКАЗ КАРТОЧЕК ==========
        function showWelcomeCard() {
            if (currentUser) {
                // Обновляем данные
                userName.textContent = currentUser.name;
                userEmail.textContent = currentUser.email;
                welcomeMessage.textContent = `С возвращением, ${currentUser.name.split(' ')[0]}!`;
                
                if (currentUser.picture) {
                    userAvatar.src = currentUser.picture;
                }
                
                // Показываем карточку приветствия
                loginCard.classList.add('hidden');
                welcomeCard.classList.remove('hidden');
            }
        }

        function showLoginCard() {
            loginCard.classList.remove('hidden');
            welcomeCard.classList.add('hidden');
        }

        // ========== ВЫХОД ==========
        function signOut() {
            if (window.google && google.accounts && google.accounts.id) {
                google.accounts.id.disableAutoSelect();
            }
            localStorage.removeItem('vault_user');
            currentUser = null;
            showLoginCard();
            
            // Перерендерить кнопку
            initGoogle();
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        window.onload = function() {
            if (!restoreSession()) {
                initGoogle();
            }
        };

        // ========== ОБРАБОТЧИКИ ==========
        logoutBtn.addEventListener('click', signOut);

        // ========== СИНХРОНИЗАЦИЯ МЕЖДУ ВКЛАДКАМИ ==========
        window.addEventListener('storage', (e) => {
            if (e.key === 'vault_user') {
                if (e.newValue) {
                    try {
                        currentUser = JSON.parse(e.newValue);
                        showWelcomeCard();
                    } catch (err) {}
                } else {
                    currentUser = null;
                    showLoginCard();
                }
            }
        });
    </script>
</body>
</html>
