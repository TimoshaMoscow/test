        // ========== РЕНДЕР ЗАЛОВ ==========
        const hallsContainer = document.getElementById('halls');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const closeBtn = document.getElementById('closeModal');

        function renderHalls() {
            hallsContainer.innerHTML = museumData.halls.map(hall => `
                <div class="hall-card" data-id="${hall.id}">
                    <div class="hall-icon">${hall.icon}</div>
                    <div class="hall-title">${hall.title}</div>
                    <div class="hall-desc">${hall.desc}</div>
                    <div class="hall-badge">${hall.badge}</div>
                </div>
            `).join('');

            document.querySelectorAll('.hall-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    const hall = museumData.halls.find(h => h.id === id);
                    if (hall) openHall(hall);
                });
            });
        }

        function openHall(hall) {
            modalTitle.innerText = `${hall.icon} ${hall.title}`;
            modalBody.innerHTML = hall.exhibits.map(ex => `
                <div class="exhibit">
                    <div class="exhibit-title">${ex.title}</div>
                    <div class="exhibit-desc">${ex.desc}</div>
                    <div class="exhibit-meta">${ex.meta}</div>
                </div>
            `).join('');
            modal.classList.add('active');
        }

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });

        // снежинки фона
        function createSnow() {
            const snowContainer = document.getElementById('snow');
            for (let i = 0; i < 30; i++) {
                const flake = document.createElement('div');
                flake.className = 'snowflake';
                flake.style.left = Math.random() * 100 + '%';
                flake.style.animationDuration = Math.random() * 10 + 5 + 's';
                flake.style.fontSize = Math.random() * 2 + 1 + 'rem';
                flake.style.opacity = Math.random() * 0.3 + 0.1;
                flake.innerHTML = ['❄️', '❄️', '❄️', '❄️', '❄️', '❄️', '❄️', '❄️', '❄️', '❄️'][Math.floor(Math.random() * 10)];
                snowContainer.appendChild(flake);
            }
        }

        renderHalls();
        createSnow();
    </script>
