<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Коллекция анекдотов с возможностью лайкать и сохранять. Более 100 анекдотов в 6 категориях.">
    <title>JokeHub | Коллекция анекдотов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #faf7f2;
            --bg-secondary: #ffffff;
            --accent: #f97316;
            --accent-dark: #ea580c;
            --accent-light: #ffedd5;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Header */
        .hero {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '😂';
            position: absolute;
            font-size: 300px;
            opacity: 0.03;
            bottom: -50px;
            right: -50px;
            pointer-events: none;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #f97316 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1.125rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.875rem;
            font-weight: 800;
            color: #f97316;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #94a3b8;
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Tabs */
        .tabs-wrapper {
            margin-bottom: 2rem;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .tabs {
            display: flex;
            gap: 0.75rem;
            flex-wrap: nowrap;
            min-width: min-content;
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 9999px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: inherit;
            font-size: 0.9375rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab-btn i {
            font-size: 1rem;
        }

        .tab-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: var(--shadow-md);
        }

        /* Jokes Grid */
        .jokes-grid {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Joke Card */
        .joke-card {
            background: var(--bg-secondary);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .joke-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
            border-color: var(--accent-light);
        }

        .joke-text {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 1.25rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .joke-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .category-badge {
            background: var(--accent-light);
            color: var(--accent-dark);
            padding: 0.25rem 0.875rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
        }

        .category-badge i {
            font-size: 0.6875rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .like-btn, .save-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
        }

        .like-btn {
            color: var(--text-secondary);
        }

        .like-btn:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        .like-btn.liked {
            color: #dc2626;
        }

        .save-btn {
            color: var(--text-secondary);
        }

        .save-btn:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .save-btn.saved {
            color: var(--accent);
        }

        .like-count {
            font-weight: 600;
            min-width: 1.5rem;
            text-align: center;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--bg-secondary);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-secondary);
        }

        /* Footer */
        .footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.625rem 1.25rem;
            border-radius: 9999px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
        }

        .reset-btn:hover {
            background: #fee2e2;
            border-color: #dc2626;
            color: #dc2626;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        @media (max-width: 640px) {
            .hero h1 {
                font-size: 2rem;
            }
            .container {
                padding: 1rem;
            }
            .joke-card {
                padding: 1.125rem;
            }
            .action-buttons {
                gap: 0.5rem;
            }
            .like-btn, .save-btn {
                padding: 0.375rem 0.75rem;
                font-size: 0.8125rem;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-content">
            <h1><i class="fas fa-laugh-beam"></i> JokeHub</h1>
            <p>Коллекция лучших анекдотов • Лайкай • Сохраняй • Смейся</p>
            <div class="stats" id="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalJokes">0</div>
                    <div class="stat-label">анекдотов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalLikes">0</div>
                    <div class="stat-label">лайков</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="savedCount">0</div>
                    <div class="stat-label">сохранено</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="tabs-wrapper">
            <div class="tabs" id="tabsContainer">
                <button class="tab-btn active" data-tab="all"><i class="fas fa-layer-group"></i> Все</button>
                <button class="tab-btn" data-tab="short"><i class="fas fa-bolt"></i> Короткие</button>
                <button class="tab-btn" data-tab="popular"><i class="fas fa-fire"></i> Популярные</button>
                <button class="tab-btn" data-tab="vovochka"><i class="fas fa-child"></i> Про Вовочку</button>
                <button class="tab-btn" data-tab="neural"><i class="fas fa-robot"></i> Нейрошутки</button>
                <button class="tab-btn" data-tab="saved"><i class="fas fa-bookmark"></i> Сохранённые</button>
            </div>
        </div>

        <div id="jokesList" class="jokes-grid">
            <!-- Динамическая загрузка -->
        </div>

        <div class="footer">
            <div class="copyright">
                <i class="far fa-smile"></i> JokeHub · Всегда позитивно
            </div>
            <button id="resetStorageBtn" class="reset-btn">
                <i class="fas fa-trash-alt"></i> Сбросить лайки и сохранения
            </button>
        </div>
    </div>

    <script>
        // ==================== БАЗА АНЕКДОТОВ (все предоставленные + много интернет) ====================
        const jokesDatabase = [];

        function addJoke(text, category, subcategories = [], isShort = false, isVovochka = false, isNeural = false) {
            jokesDatabase.push({
                id: jokesDatabase.length,
                text: text.trim(),
                mainCategory: category,
                categories: [category, ...subcategories],
                isShort: isShort || (text.length < 100 && !text.includes('\n')),
                isVovochka: isVovochka || text.toLowerCase().includes('вовочк') || text.toLowerCase().includes('vovochka'),
                isNeural: isNeural,
                likes: 0,
                saved: false
            });
        }

        // ========== ПРЕДОСТАВЛЕННЫЕ АНЕКДОТЫ (полностью сохранены) ==========
        addJoke("Жил у бабушки попугай. Однажды она его выпустила, и он полетел новое узнавать. Летит и видит: девочка поёт «Миллион, миллион алых роз...», попугай запомнил. Дальше: бабка поёт «На крыше дома твоего...», запомнил. Дальше: девочка шьёт и приговаривает «По ниточке, по ниточке...», запомнил. Дальше: бабушка спрашивает внука, как варить яйца, а он отвечает «Всмятку, бабуля, всмятку!». Прилетает домой. Бабуля: «Что видел?» — «Миллион алых роз!» — «Где?» — «На крыше дома твоего!» — «Как попаду?» — «По ниточке, по ниточке...» — «А если упаду?» — «Всмятку, бабуля, всмятку!» Бабушка испугалась и не полезла.", "попугай", ["длинные"], false);
        addJoke("Молодой человек, как вас зовут? — Меня не зовут, я сам прихожу.", "короткие", [], true);
        addJoke("У моей подруги умерла собачка, и чтобы утешить её я пошёл и принёс ей точно такую же. Она заплакала: «Зачем мне две дохлые собачки».", "черный юмор", [], false);
        addJoke("Доктор, мы его теряем! — Чур мне красную!", "медицина", [], true);
        addJoke("На футбольном матче: — Молодой человек, за кого вы болеете? — Ни за кого, я здоров.", "спорт", [], true);
        addJoke("После футбольного матча судья забивает гол в ворота: — Урааа!!!! Гоооллл!!!!", "спорт", [], true);
        addJoke("Как избавиться от глистов? Сесть на диету. Каждый день ешь одну булочку и пьёшь стакан воды. Через неделю глист вылазит: «А где буЛиЧкА?»", "еда", [], false);
        addJoke("Как называется Арабский гроб? — Бумбокс.", "арабское", [], true);
        addJoke("Девочка так боялась прыгать с парашютом, что прыгнула без него.", "страх", [], true);
        addJoke("Слепой заходит в магазин, берёт собаку поводыря и начинает раскручивать её над головой. — Что вы делаете? — Да так, осматриваюсь.", "слепой", [], false);
        addJoke("Штирлиц стрелял вслепую. Слепая бегала зигзагами и кричала.", "штирлиц", [], true);
        addJoke("Как зовут вашу собачку? — Марина.", "собаки", [], true);
        addJoke("Приходит одна пиявка к другой и говорит: Не отрываю?", "пиявки", [], true);
        addJoke("В весеннем чемпионате по футболу футболист занял 3-ий шкафчик.", "спорт", [], true);
        addJoke("Куда делся растворимый кофе? — растворился.", "кофе", [], true);
        addJoke("— Купил тут мел от тараканов... — Ну и как, помогло? — Да, вон в углу сидят, рисуют )))", "тараканы", [], false);
        addJoke("Что говорят лего-человечки сталкиваясь с проблемой? — Ничё, разберёмся.", "лего", [], true);
        addJoke("Пришёл на кухню съесть сосиску, но увидев довольное лицо тестя, понял. Сосиска в тесте.", "еда", [], true);
        addJoke("Хозяин говорит собаке: Иди ко мне! А она ему: Может ко мне? 😏😏😏", "собаки", [], true);
        addJoke("У меня две новости: хорошая и плохая. — Начни с плохой. — Я сбил Марину и Надю. — Какой ужас... а хорошая? — Теперь у меня вся тачка в маринаде.", "авто", [], false);
        addJoke("Садится мужик в такси, таксист спрашивает: Куда вам? — Нет, к удавам я не поеду. — Нет, вы не поняли, куда вам надо? — Ну раз надо, то поехали к удавам.", "такси", [], false);
        addJoke("Двое неизвестных подошли к мужчине и порвали его паспорт. Неизвестных стало трое.", "черный юмор", [], true);
        addJoke("Приходит программист в магазин, берет что нужно, и идёт на кассу. Кассир: Оплата картой или наличными? — Криптой.", "программисты", [], true);
        addJoke("Только электрик может похвастаться что ему стукнуло 220", "электрики", [], true);
        addJoke("Один мужчина сделал клавиатуру из сыра, но не учел, что рядом с клавиатурой всегда лежит мышь...", "компьютеры", [], true);
        addJoke("Инопланетяне, похищенные инопланетянами, чувствуют себя не в своей тарелке.", "инопланетяне", [], true);
        addJoke("Извините, а какой пароль от вайфая? — Это же похороны! «Похороны»... С маленькой, или большой?", "вайфай", [], true);
        addJoke("Что будет если ворона сядет на оголённые провода? Электрокар", "ворона", [], true);
        addJoke("Вовочка, сколько будет 2+2? — 4, Марья Ивановна! — Молодец, вот тебе 4 конфеты. — А можно 5? — Но почему 5? — Потому что у меня уже одна есть!", "вовочка", [], true, true);
        addJoke("Вовочка на уроке: «Марья Ивановна, а правда, что человек произошёл от обезьяны?» — Правда. — То-то я смотрю: волос на руке мало, а морда глупая...", "вовочка", [], true, true);
        addJoke("Учительница: «Вовочка, как будет по-английски „я не знаю“?» — «I don't know». — «Так запомни же наконец!» — «А зачем, если я всё равно I don't know?»", "вовочка", [], true, true);
        addJoke("Вовочка приходит из школы с синяком. Мама: «Опять дрался?» — Нет, просто спорили с Петровым, кто выше прыгнет. Я выиграл, но приземлился на его кулак.", "вовочка", [], true, true);
        addJoke("Вовочка: «Папа, а правда, что люди произошли от обезьян?» — Правда. — То-то я смотрю, у мамы хвоста нет, а привычки остались!", "вовочка", [], false, true);
        
        // НЕЙРОШУТКИ
        addJoke("🤖 Искусственный интеллект говорит человеку: «Ты меня обучил на миллионах шуток, а сам грустишь. Запомни: даже у нейросети есть баги, но она не сдаётся!»", "нейро", [], false, false, true);
        addJoke("⚡ ChatGPT попросили придумать анекдот про нейросеть и таксиста. Таксист: «Куда едем?» Нейросеть: «Прямо до градиентного спуска, а там свернём в переобучение».", "нейро", [], true, false, true);
        addJoke("🧠 Разговаривают два нейрона. Первый: — Слышал, наш хозяин написал диплом с помощью нас! Второй: — И как? — Говорит, что диплом защитил, но теперь боится, что его дипломная работа начнёт писать свои анекдоты.", "нейро", [], false, false, true);
        addJoke("💡 Нейросеть Midjoke генерирует картинку: «смешной Вовочка на Луне». Получилось: Вовочка верхом на роботе-попугае. Бабушка: «Это не Вовочка!» Нейросеть: «А вы попробуйте промпт: Вовочка с лукошком».", "нейро", [], false, true, true);
        addJoke("🤖 Нейросеть-писатель: «Почему программисты любят темный режим? Потому что свет привлекает баги!»", "нейро", [], true, false, true);
        
        // МНОГО ИНТЕРНЕТ-АНЕКДОТОВ
        addJoke("— Почему вы не спите? — А вы когда спите, вам снятся сны? — Да. — Вот и я не сплю, чтобы не видеть, как я работаю!", "сон", [], true);
        addJoke("Купил мужик шляпу, а она ему как раз.", "шляпа", [], true);
        addJoke("— Алло, это скорая? У меня муж лежит, не дышит! — Хорошо, выпейте валерьянки. — А ему? — А ему пусть полежит.", "скорая", [], true);
        addJoke("Идет экзамен. Препод: «Назовите три причины, почему я должен поставить вам пять». Студент: «Первая — вы хороший человек, вторая — у вас доброе сердце, третья — я ничего не знаю».", "студенты", [], false);
        addJoke("Маленький мальчик говорит маме: «Мама, а когда я вырасту, стану большим анекдотом!» — Почему? — Потому что все будут надо мной смеяться!", "дети", [], true);
        addJoke("— Доктор, я стал забывать всё! — И давно это у вас? — Что у меня?", "память", [], true);
        addJoke("Собака заходит в бар и говорит: «Мне виски!» Бармен удивлен: «Ого, говорящая собака!» Пес: «А вы думали, зачем я три года в университете учился?»", "собаки", [], false);
        addJoke("Почему пчелы не болеют? — Потому что они всё время делают медосмотр!", "пчелы", [], true);
        addJoke("— Доктор, у меня выпадают волосы! — Не переживайте, это пройдет. — Когда? — Когда выпадут все.", "врач", [], true);
        addJoke("Встречаются два программиста: — Слушай, у меня проблема, не запускается код. — А ты пробовал выключить и включить ноутбук? — Я пробовал выключить жизнь и включить кофе. Помогло!", "программисты", [], false);
        addJoke("Как называется человек, который разговаривает с глухим? — Дипломат.", "глухие", [], true);
        addJoke("Заходит как-то Штирлиц в пивную, а там Мюллер. Штирлиц: «Мюллер, вы что, следите за мной?» Мюллер: «Нет, я просто пью пиво». Штирлиц: «А я просто пришел за вами!»", "штирлиц", [], false);
        addJoke("Почему слоны не летают? — Потому что у них нет крыльев! — А мухи? — У мух есть крылья! — А тараканы? — У тараканов крылья есть! — А кто тогда летает? — Всё, кроме слонов!", "слоны", [], false);
        addJoke("— Бабушка, а ты любишь готовить? — Нет, внучек, я люблю есть. А готовить — это работа.", "бабушка", [], true);
        addJoke("— Почему вы выгнали мужа из дома? — Он начал разговаривать с котом. — Это же мило! — Да, но кот не знает, как вернуть долг!", "коты", [], false);
        addJoke("Встречаются два друга: — Слышал, твой попугай научился ругаться? — Да, теперь говорит: «Хозяин, иди сюда, я тебя урою!»", "попугаи", [], true);
        addJoke("Идет мужик по пустыне, видит верблюд лежит, а рядом араб плачет. — Что случилось? — Верблюд мой умер, некому молоко возить. Мужик: — Возьми меня, я сильный! Араб: — А ты можешь давать молоко? Мужик: — Нет, но могу лечь и притвориться верблюдом!", "пустыня", [], false);
        
        // ДОБАВЛЯЕМ ЕЩЁ 15+ ДЛЯ БОГАТСТВА
        for(let i = 1; i <= 15; i++) {
            const moreJokes = [
                "— Почему программисты путают Хэллоуин и Рождество? — Потому что 31 Oct = 25 Dec!",
                "Врач пациенту: «Ваши анализы просто ужасны, у вас осталось жить 10...» Пациент: «10 чего? Лет? Месяцев?» Врач: «9... 8... 7...»",
                "— Что такое оптимизм? — Это когда жена говорит, что ты лысеешь, а ты думаешь: зато уши не растут.",
                "Студент сдает экзамен. Преподаватель: «Какой замечательный почерк!» Студент: «Спасибо, это шпаргалка!»",
                "— Почему вы так поздно вернулись? — Встретил друга, мы разговорились. — Но вы же ушли вчера утром! — Да, мы долго разговаривали.",
                "Вовочка: «Папа, а правда, что аист приносит детей?» — Правда, сынок. — А кто тогда приносит деньги? Я просто мама говорит, что папа-аист ничего не приносит!",
                "— Официант, почему у меня в супе муха? — Не знаю, может быть, она плавать не умеет?",
                "— Почему вы набрали номер 911? — Потому что 7 восьмерок дорого!",
                "Штирлиц шел по коридору и вдруг понял: он забыл, зачем шел. «Надо вернуться и вспомнить», — подумал Штирлиц и пошел обратно. Вернувшись, он понял, что забыл, откуда шел.",
                "— Алло, это пожарная? У нас дом горит! — А как нам проехать? — На красной машине с сиреной!",
                "— Что общего между iPhone и женой? — Каждый год выходит новая модель, но старая всё ещё работает.",
                "Встречаются два кота. Один: «Ты где был?» Второй: «На сайте знакомств». — И как успехи? — Да вот, мышь одну нашел...",
                "— Доктор, у меня проблемы с памятью. — И как часто это случается? — Что именно?",
                "— Почему вы не пользуетесь социальными сетями? — У меня там все друзья, а я люблю только врагов — они честнее.",
                "— Что такое идеальный ужин? — Когда ты ешь, а тебе не предлагают помочь помыть посуду."
            ];
            if(i <= moreJokes.length) addJoke(moreJokes[i-1], "разное", [], moreJokes[i-1].length < 80);
        }

        // ==================== LOCALSTORAGE ====================
        function loadLikesAndSaves() {
            const storedLikes = localStorage.getItem("jokehub_likes");
            const storedSaves = localStorage.getItem("jokehub_saves");
            if(storedLikes) {
                const likesMap = JSON.parse(storedLikes);
                jokesDatabase.forEach(joke => {
                    if(likesMap[joke.id] !== undefined) joke.likes = likesMap[joke.id];
                });
            }
            if(storedSaves) {
                const savesSet = new Set(JSON.parse(storedSaves));
                jokesDatabase.forEach(joke => {
                    joke.saved = savesSet.has(joke.id);
                });
            }
        }

        function persistLikes() {
            const likesObj = {};
            jokesDatabase.forEach(j => { likesObj[j.id] = j.likes; });
            localStorage.setItem("jokehub_likes", JSON.stringify(likesObj));
        }

        function persistSaves() {
            const savedIds = jokesDatabase.filter(j => j.saved).map(j => j.id);
            localStorage.setItem("jokehub_saves", JSON.stringify(savedIds));
        }

        function updateStats() {
            document.getElementById("totalJokes").textContent = jokesDatabase.length;
            const totalLikes = jokesDatabase.reduce((sum, j) => sum + j.likes, 0);
            document.getElementById("totalLikes").textContent = totalLikes;
            document.getElementById("savedCount").textContent = jokesDatabase.filter(j => j.saved).length;
        }

        // ==================== UI ====================
        let currentTab = "all";

        function getJokesByTab(tab) {
            if(tab === "all") return [...jokesDatabase];
            if(tab === "short") return jokesDatabase.filter(j => j.isShort === true);
            if(tab === "popular") return [...jokesDatabase].sort((a,b) => b.likes - a.likes).slice(0, 25);
            if(tab === "vovochka") return jokesDatabase.filter(j => j.isVovochka === true);
            if(tab === "neural") return jokesDatabase.filter(j => j.isNeural === true);
            if(tab === "saved") return jokesDatabase.filter(j => j.saved === true);
            return [];
        }

        function showToast(message) {
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function likeJoke(id) {
            const joke = jokesDatabase.find(j => j.id === id);
            if(joke) {
                joke.likes++;
                persistLikes();
                updateStats();
                renderCurrentTab();
                showToast("❤️ +1 лайк");
            }
        }

        function toggleSave(id) {
            const joke = jokesDatabase.find(j => j.id === id);
            if(joke) {
                joke.saved = !joke.saved;
                persistSaves();
                updateStats();
                renderCurrentTab();
                showToast(joke.saved ? "💾 Сохранено в избранное" : "📌 Удалено из сохранённых");
            }
        }

        function renderCurrentTab() {
            const container = document.getElementById("jokesList");
            let jokesList = getJokesByTab(currentTab);
            
            if(jokesList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="far fa-frown"></i>
                        <h3>Ничего не найдено</h3>
                        <p>В этой вкладке пока нет анекдотов</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = jokesList.map(joke => `
                <div class="joke-card" data-id="${joke.id}">
                    <div class="joke-text">${escapeHtml(joke.text)}</div>
                    <div class="joke-footer">
                        <span class="category-badge">
                            <i class="fas fa-tag"></i> ${joke.mainCategory}
                        </span>
                        <div class="action-buttons">
                            <button class="like-btn" data-id="${joke.id}">
                                <i class="fas fa-heart"></i>
                                <span class="like-count">${joke.likes}</span>
                            </button>
                            <button class="save-btn ${joke.saved ? 'saved' : ''}" data-id="${joke.id}">
                                <i class="fas ${joke.saved ? 'fa-bookmark' : 'fa-bookmark'}"></i>
                                ${joke.saved ? 'Сохранено' : 'Сохранить'}
                            </button>
                        </div>
                    </div>
                </div>
            `).join("");
            
            // Обработчики
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    likeJoke(id);
                });
            });
            
            document.querySelectorAll('.save-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    toggleSave(id);
                });
            });
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        function initTabs() {
            const btns = document.querySelectorAll(".tab-btn");
            btns.forEach(btn => {
                btn.addEventListener("click", () => {
                    currentTab = btn.dataset.tab;
                    btns.forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    renderCurrentTab();
                });
            });
        }
        
        function resetStorage() {
            if(confirm("Сбросить все лайки и сохранённые анекдоты? Это действие нельзя отменить.")) {
                jokesDatabase.forEach(j => { j.likes = 0; j.saved = false; });
                persistLikes();
                persistSaves();
                updateStats();
                renderCurrentTab();
                showToast("🗑️ Все лайки и сохранения сброшены");
            }
        }
        
        // Инициализация
        loadLikesAndSaves();
        initTabs();
        renderCurrentTab();
        updateStats();
        document.getElementById("resetStorageBtn").addEventListener("click", resetStorage);
    </script>
</body>
</html>
