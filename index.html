<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Tuber — конструктор + чистая сцена</title>
    <style>
        /* Стили для интерфейса (основная страница) */
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a1a24;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container {
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border: 1px solid #4a4a6a;
            max-width: 1000px;
            width: fit-content;
        }
        h1 {
            font-size: 2.2rem;
            margin: 0 0 20px 0;
            background: linear-gradient(145deg, #b0b8ff, #d0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .preview-row {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .preview-box {
            background: #252532;
            border-radius: 36px;
            padding: 20px;
            border: 1px solid #5a5a88;
        }
        .preview-box h3 {
            color: #c6d0ff;
            margin: 0 0 15px 0;
            font-weight: 400;
            text-align: center;
        }
        .thumb {
            width: 200px;
            height: 200px;
            background: #2e2e3a;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid #4d4d70;
        }
        .thumb img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .placeholder-icon {
            font-size: 3rem;
            opacity: 0.5;
        }
        .upload-area {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .file-label {
            background: #40406c;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #8a8ac0;
            box-shadow: 0 6px 0 #252538;
            transition: 0.1s;
            display: inline-block;
        }
        .file-label:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #252538;
        }
        input[type="file"] {
            display: none;
        }
        .filename {
            background: #1d1d2b;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            color: #b4b4e0;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .control-panel {
            background: #20202c;
            border-radius: 60px;
            padding: 20px 30px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 30px 0 20px;
        }
        .link-box {
            display: flex;
            background: #12121c;
            border-radius: 60px;
            border: 1px solid #5f5f90;
            overflow: hidden;
            flex: 2 1 400px;
        }
        .link-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 24px;
            color: white;
            font-size: 1rem;
            outline: none;
            font-family: monospace;
        }
        .link-box button {
            background: #5d5d9a;
            border: none;
            color: white;
            padding: 12px 30px;
            font-weight: 600;
            cursor: pointer;
            border-left: 2px solid #33334c;
            transition: 0.1s;
            white-space: nowrap;
            font-size: 1rem;
        }
        .link-box button:active {
            background: #4a4a7a;
        }
        .big-btn {
            background: #6a5ac0;
            border: none;
            color: white;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #3d3a6a;
            transition: 0.1s;
            border: 1px solid #a090ff;
            white-space: nowrap;
        }
        .big-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #3d3a6a;
        }
        .status {
            background: #1e1e2c;
            border-radius: 40px;
            padding: 15px 25px;
            margin: 15px 0 0;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            border-left: 6px solid #7a6aff;
        }
        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4aff7a;
            box-shadow: 0 0 12px #33ff55;
            transition: 0.1s;
        }
        .dot.muted {
            background: #ff4a4a;
            box-shadow: 0 0 12px #ff3333;
        }
        .warning {
            color: #b2b2da;
            font-size: 0.9rem;
        }
        footer {
            text-align: center;
            color: #6a6a90;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 PNG TUBER · ДВЕ СТРАНИЦЫ В ОДНОЙ</h1>
        
        <!-- Предпросмотр загруженных картинок -->
        <div class="preview-row">
            <div class="preview-box">
                <h3>🙂 ЗАКРЫТЫЙ рот</h3>
                <div class="thumb" id="closedThumb">
                    <span class="placeholder-icon">🖼️</span>
                </div>
                <div class="upload-area">
                    <label for="uploadClosed" class="file-label">Выбрать файл</label>
                    <input type="file" id="uploadClosed" accept="image/*">
                    <div id="closedFileName" class="filename">не выбрано</div>
                </div>
            </div>
            <div class="preview-box">
                <h3>😲 ОТКРЫТЫЙ рот</h3>
                <div class="thumb" id="openThumb">
                    <span class="placeholder-icon">🖼️</span>
                </div>
                <div class="upload-area">
                    <label for="uploadOpen" class="file-label">Выбрать файл</label>
                    <input type="file" id="uploadOpen" accept="image/*">
                    <div id="openFileName" class="filename">не выбрано</div>
                </div>
            </div>
        </div>

        <!-- Панель генерации ссылки на ЧИСТУЮ версию -->
        <div class="control-panel">
            <div class="link-box">
                <input type="text" id="pureLink" readonly placeholder="сначала загрузите изображения" value="">
                <button id="copyBtn">📋 Копировать</button>
            </div>
            <button class="big-btn" id="generateBtn">✨ СГЕНЕРИРОВАТЬ ЧИСТУЮ ССЫЛКУ</button>
        </div>

        <!-- Статус микрофона (на основной странице он тоже работает для проверки) -->
        <div class="status">
            <span>🎤 Микрофон:</span>
            <span id="micStatus">запрос...</span>
            <span id="micDot" class="dot muted"></span>
            <span class="warning">(выберите устройство в адресной строке)</span>
        </div>
        <footer>⬇️ Чистая ссылка ведёт на страницу ТОЛЬКО с персонажем (без интерфейса). Вставьте её в OBS.</footer>
    </div>

    <script>
        (function() {
            // DOM элементы
            const uploadClosed = document.getElementById('uploadClosed');
            const uploadOpen = document.getElementById('uploadOpen');
            const closedFileName = document.getElementById('closedFileName');
            const openFileName = document.getElementById('openFileName');
            const closedThumb = document.getElementById('closedThumb');
            const openThumb = document.getElementById('openThumb');
            const pureLinkInput = document.getElementById('pureLink');
            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');
            const micStatus = document.getElementById('micStatus');
            const micDot = document.getElementById('micDot');

            // Данные картинок (base64)
            let closedImageData = null;
            let openImageData = null;

            // Для предпросмотра
            function updateThumb(element, dataUrl) {
                element.innerHTML = ''; // очистить
                if (dataUrl) {
                    const img = document.createElement('img');
                    img.src = dataUrl;
                    img.style.maxWidth = '100%';
                    img.style.maxHeight = '100%';
                    element.appendChild(img);
                } else {
                    element.innerHTML = '<span class="placeholder-icon">🖼️</span>';
                }
            }

            // Обработчики загрузки
            uploadClosed.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    closedImageData = ev.target.result;
                    closedFileName.textContent = file.name.length > 30 ? file.name.slice(0,27)+'…' : file.name;
                    updateThumb(closedThumb, closedImageData);
                };
                reader.readAsDataURL(file);
            });

            uploadOpen.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    openImageData = ev.target.result;
                    openFileName.textContent = file.name.length > 30 ? file.name.slice(0,27)+'…' : file.name;
                    updateThumb(openThumb, openImageData);
                };
                reader.readAsDataURL(file);
            });

            // Генерация чистой ссылки (ведёт на ЭТУ ЖЕ страницу, но с параметром #? и флагом ?clean)
            generateBtn.addEventListener('click', () => {
                if (!closedImageData && !openImageData) {
                    alert('Загрузите хотя бы одно изображение');
                    return;
                }

                // Формируем объект с картинками
                const dataObject = {
                    closed: closedImageData || '',
                    open: openImageData || ''
                };
                
                const jsonStr = JSON.stringify(dataObject);
                const encoded = encodeURIComponent(jsonStr);
                
                // Берём базовый URL (без хэша и параметров)
                const baseUrl = window.location.href.split('#')[0].split('?')[0];
                
                // Создаём чистую ссылку: добавляем параметр ?clean и хэш с данными
                // Параметр clean заставит страницу показать только холст
                const pureUrl = baseUrl + '?clean=1#' + encoded;
                
                pureLinkInput.value = pureUrl;
            });

            // Копирование ссылки
            copyBtn.addEventListener('click', () => {
                if (pureLinkInput.value) {
                    navigator.clipboard.writeText(pureLinkInput.value)
                        .then(() => alert('✅ Чистая ссылка скопирована!'))
                        .catch(() => alert('❌ Не удалось скопировать'));
                } else {
                    alert('Сначала сгенерируйте ссылку');
                }
            });

            // ---------- МИКРОФОН (для проверки на основной странице) ----------
            let audioContext, analyser, source, mediaStream, animationFrame;
            let mouthOpen = false; // не используется в интерфейсе напрямую, но нужно для логики
            
            async function setupMicrophone() {
                try {
                    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioContext.state === 'suspended') await audioContext.resume();
                    
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    const bufferLength = analyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);
                    
                    source = audioContext.createMediaStreamSource(mediaStream);
                    source.connect(analyser);
                    
                    micStatus.textContent = 'активен';
                    micDot.classList.remove('muted');
                    
                    function checkVolume() {
                        if (!analyser) return;
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
                        const avg = sum / bufferLength;
                        const threshold = 10;
                        
                        if (avg > threshold) {
                            micDot.style.background = '#4aff7a';
                            micDot.style.boxShadow = '0 0 16px #33ff55';
                        } else {
                            micDot.style.background = '#ff4a4a';
                            micDot.style.boxShadow = '0 0 12px #ff3333';
                        }
                        
                        animationFrame = requestAnimationFrame(checkVolume);
                    }
                    checkVolume();
                    
                } catch (err) {
                    micStatus.textContent = 'нет доступа';
                    micDot.classList.add('muted');
                }
            }
            setupMicrophone();

            // Возобновление аудиоконтекста по клику
            document.addEventListener('click', () => {
                if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            });
        })();
    </script>

    <!-- ========== ЧАСТЬ ДЛЯ ЧИСТОЙ СТРАНИЦЫ (отображается только при ?clean=1) ========== -->
    <style id="clean-style">
        /* Эти стили активируются только если в URL есть ?clean=1 */
    </style>
    <script>
        (function() {
            // Проверяем, нужно ли показать чистую версию (только холст)
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('clean') && urlParams.get('clean') === '1') {
                // Удаляем ВЕСЬ интерфейс и показываем только холст с персонажем
                document.body.innerHTML = `
                    <style>
                        body { margin: 0; overflow: hidden; background: transparent; width: 100vw; height: 100vh; display: flex; }
                        canvas { display: block; width: 100%; height: 100%; object-fit: contain; background: transparent; }
                    </style>
                    <canvas id="cleanCanvas" width="800" height="600"></canvas>
                `;

                const canvas = document.getElementById('cleanCanvas');
                const ctx = canvas.getContext('2d');

                // Адаптивный размер
                function resize() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    draw();
                }
                window.addEventListener('resize', resize);
                resize();

                // Загружаем данные из hash
                let closedImg = null;
                let openImg = null;
                let mouthOpen = false;

                function loadFromHash() {
                    if (!window.location.hash) return;
                    try {
                        const hash = decodeURIComponent(window.location.hash.substring(1));
                        const data = JSON.parse(hash);

                        if (data.closed) {
                            const img = new Image();
                            img.onload = () => { closedImg = img; draw(); };
                            img.src = data.closed;
                        }
                        if (data.open) {
                            const img = new Image();
                            img.onload = () => { openImg = img; draw(); };
                            img.src = data.open;
                        }
                    } catch (e) {}
                }
                loadFromHash();

                // Рисование
                function draw() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const img = mouthOpen ? openImg : closedImg;
                    if (!img) return;

                    const imgW = img.naturalWidth;
                    const imgH = img.naturalHeight;
                    const canvasW = canvas.width;
                    const canvasH = canvas.height;

                    const imgAspect = imgW / imgH;
                    const canvasAspect = canvasW / canvasH;

                    let drawW, drawH, x = 0, y = 0;
                    if (imgAspect > canvasAspect) {
                        drawH = canvasH;
                        drawW = imgW * (canvasH / imgH);
                        x = (canvasW - drawW) / 2;
                    } else {
                        drawW = canvasW;
                        drawH = imgH * (canvasW / imgW);
                        y = (canvasH - drawH) / 2;
                    }
                    ctx.drawImage(img, x, y, drawW, drawH);
                }

                // ---------- Микрофон для чистой страницы ----------
                let audioContext, analyser, source, mediaStream, animationFrame;

                async function setupMicrophone() {
                    try {
                        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        if (audioContext.state === 'suspended') await audioContext.resume();

                        analyser = audioContext.createAnalyser();
                        analyser.fftSize = 256;
                        const bufferLength = analyser.frequencyBinCount;
                        const dataArray = new Uint8Array(bufferLength);

                        source = audioContext.createMediaStreamSource(mediaStream);
                        source.connect(analyser);

                        function checkVolume() {
                            if (!analyser) return;
                            analyser.getByteFrequencyData(dataArray);
                            let sum = 0;
                            for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
                            const avg = sum / bufferLength;
                            const threshold = 10;

                            const newState = avg > threshold;
                            if (newState !== mouthOpen) {
                                mouthOpen = newState;
                                draw();
                            }
                            animationFrame = requestAnimationFrame(checkVolume);
                        }
                        checkVolume();
                    } catch (err) {
                        // без микрофона просто ничего не делаем
                    }
                }
                setupMicrophone();

                // Возобновление контекста
                document.addEventListener('click', () => {
                    if (audioContext && audioContext.state === 'suspended') audioContext.resume();
                });
            }
        })();
    </script>
</body>
</html>
