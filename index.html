<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>РКН.МАРКЕТ — блокировки оптом и в розницу</title>
  <!-- SEO мета-теги (ироничные) -->
  <meta name="description" content="Официальный маркетплейс Роскомнадзора. Реестры, блокировки, замедления. Оптом и в розницу. Сертифицированные решения для изоляции рунета.">
  <meta name="keywords" content="РКН, Роскомнадзор, блокировка сайтов, замедление трафика, реестр запрещенной информации, изоляция рунета">
  <meta name="author" content="Федеральная служба по надзору в сфере связи">
  <link rel="canonical" href="https://rkn.market">
  <!-- PWA / Манифест (с символикой) -->
  <link rel="manifest" href="#manifest-placeholder">
  <meta name="theme-color" content="#276fdb">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192/276fdb/ffffff?text=РКН">
  <!-- Font Awesome 6 (иконки) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Глобальные переменные и сброс — палитра глубокие прятки (#276fdb) сохранена */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
    }

    :root {
      --primary: #276fdb;                /* Глубокие прятки — основной цвет РКН */
      --primary-light: #4f8ef0;
      --primary-dark: #1a4f9e;
      --glass-bg: rgba(255, 255, 255, 0.3);
      --glass-border: rgba(255, 255, 255, 0.5);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
      --text-dark: #1e2a41;
      --text-light: #f8faff;
      --backdrop-blur: blur(12px);
      --warning-red: #db2727;
    }

    body {
      background: linear-gradient(145deg, #f0f5fe 0%, #d9e6ff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text-dark);
    }

    /* Матовое стекло для всех карточек */
    .glass-card, header, footer, .product-card, .cart-panel, .search-box, .category-btn, .pagination-btn, .rkn-badge {
      background: var(--glass-bg);
      backdrop-filter: var(--backdrop-blur);
      -webkit-backdrop-filter: var(--backdrop-blur);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--glass-shadow);
    }

    /* Хедер с символикой */
    header {
      margin: 16px 20px;
      padding: 12px 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.4);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary-dark);
      background: rgba(255,255,255,0.5);
      padding: 6px 20px;
      border-radius: 40px;
      letter-spacing: -0.5px;
    }

    .logo i {
      color: var(--primary);
      margin-right: 8px;
    }

    /* Поиск по реестрам */
    .search-box {
      display: flex;
      align-items: center;
      padding: 8px 18px;
      background: rgba(255,255,255,0.35);
      flex: 1 1 300px;
      max-width: 500px;
      margin: 0 20px;
    }

    .search-box i {
      color: var(--primary-dark);
      font-size: 1.2rem;
      margin-right: 12px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      font-size: 1rem;
      padding: 8px 0;
      color: var(--text-dark);
    }

    .search-box input::placeholder {
      color: rgba(26, 79, 158, 0.7);
      font-weight: 300;
    }

    /* Иконки пользователя (проверяющий) */
    .user-actions {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .user-actions .cart-icon, .user-actions .profile-icon {
      font-size: 1.6rem;
      color: var(--primary-dark);
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -12px;
      background: var(--warning-red);
      color: white;
      font-size: 0.8rem;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 50px;
      border: 2px solid white;
    }

    /* Навигация — страницы ведомства */
    .nav-pages {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      width: 100%;
      justify-content: center;
    }

    .nav-page-btn {
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(5px);
      border: 1px solid var(--glass-border);
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
      color: var(--primary-dark);
      cursor: pointer;
      transition: 0.15s;
    }

    .nav-page-btn.active {
      background: var(--primary);
      color: white;
      border-color: white;
    }

    /* Основной контент */
    main {
      flex: 1;
      margin: 0 20px 30px;
    }

    /* Категории услуг РКН */
    .categories-section {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0;
      justify-content: center;
    }

    .category-btn {
      padding: 10px 24px;
      background: rgba(255,255,255,0.25);
      font-size: 1rem;
      font-weight: 500;
      color: var(--primary-dark);
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 40px;
    }

    .category-btn.active {
      background: var(--primary);
      color: white;
      border-color: white;
    }

    /* Сетка товаров (услуг) */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 24px;
    }

    /* Карточка блокировки (услуги) */
    .product-card {
      padding: 20px 16px 20px;
      background: rgba(255,255,255,0.25);
      display: flex;
      flex-direction: column;
      transition: 0.2s;
      cursor: pointer;
      border-radius: 32px;
      border-left: 4px solid var(--primary);
    }

    .product-card:hover {
      background: rgba(255,255,255,0.45);
      transform: scale(1.01);
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 28px;
      background: #f0f0f0;
      margin-bottom: 16px;
      border: 2px solid rgba(255,255,255,0.7);
      filter: grayscale(20%);
    }

    .product-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .product-title i {
      color: var(--primary);
    }

    .product-price {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--primary-dark);
      margin: 10px 0 14px;
    }

    .product-price small {
      font-size: 0.9rem;
      font-weight: 400;
      opacity: 0.8;
    }

    .rkn-badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(39, 111, 219, 0.2);
      border-radius: 30px;
      font-size: 0.8rem;
      margin-bottom: 8px;
      border: 1px solid var(--primary);
    }

    .add-to-cart-btn {
      background: var(--primary);
      border: none;
      color: white;
      padding: 14px 0;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      backdrop-filter: blur(4px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: 0.15s;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .add-to-cart-btn:hover {
      background: var(--primary-dark);
    }

    /* Корзина (реестр заблокированного) */
    .cart-overlay {
      position: fixed;
      top: 0; right: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(3px);
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
      z-index: 1000;
      display: flex;
      justify-content: flex-end;
    }

    .cart-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .cart-panel {
      width: min(480px, 96%);
      background: rgba(255,255,255,0.8);
      backdrop-filter: var(--backdrop-blur);
      height: 100%;
      margin: 10px;
      border-radius: 36px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      transform: translateX(30px);
      transition: 0.3s;
      border: 2px solid rgba(255,255,255,0.7);
    }

    .cart-overlay.active .cart-panel {
      transform: translateX(0);
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 16px;
    }

    .cart-header h2 {
      font-size: 1.8rem;
    }

    .close-cart {
      background: none;
      border: none;
      font-size: 2.2rem;
      cursor: pointer;
      color: var(--primary-dark);
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      margin-bottom: 20px;
    }

    .cart-item {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid rgba(39, 111, 219, 0.2);
    }

    .cart-item img {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      object-fit: cover;
      background: #ccc;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-title {
      font-weight: 600;
    }

    .cart-item-price {
      color: var(--primary-dark);
    }

    .cart-item-remove {
      color: var(--warning-red);
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
    }

    .cart-total {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 16px;
      text-align: right;
      color: var(--primary-dark);
    }

    .checkout-btn {
      background: var(--primary);
      border: none;
      color: white;
      padding: 20px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 20px;
      cursor: pointer;
    }

    /* Футер с дисклеймером */
    footer {
      margin: 16px 20px;
      padding: 20px;
      background: rgba(255,255,255,0.3);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      color: var(--primary-dark);
    }

    .footer-links a {
      color: var(--primary-dark);
      margin: 0 12px;
      text-decoration: none;
      font-weight: 500;
    }

    .disclaimer {
      font-size: 0.8rem;
      opacity: 0.7;
      max-width: 500px;
    }

    /* Пагинация */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 40px 0 20px;
    }

    .pagination-btn {
      padding: 12px 24px;
      background: rgba(255,255,255,0.2);
      font-size: 1.2rem;
    }

    /* Адаптивность */
    @media (max-width: 680px) {
      header {
        flex-direction: column;
        align-items: stretch;
      }
      .search-box {
        margin: 15px 0;
        max-width: 100%;
      }
      .logo {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

<!-- Хедер с навигацией РКН -->
<header>
  <div class="logo-area">
    <div class="logo"><i class="fas fa-shield-halved"></i> РКН.МАРКЕТ</div>
    <span class="rkn-badge"><i class="fas fa-ban"></i> Реестр 0+</span>
  </div>
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Поиск по реестру запрещенок..." aria-label="Поиск">
  </div>
  <div class="user-actions">
    <div class="profile-icon"><i class="fas fa-id-card"></i></div>
    <div class="cart-icon" id="cartToggleBtn">
      <i class="fas fa-database"></i>
      <span class="cart-count" id="cartCounter">0</span>
    </div>
  </div>
  <!-- псевдо-страницы: Реестр, Услуги, О нас (сатира) -->
  <div class="nav-pages">
    <button class="nav-page-btn active" data-page="home">Реестр</button>
    <button class="nav-page-btn" data-page="catalog">Услуги</button>
    <button class="nav-page-btn" data-page="about">О ведомстве</button>
  </div>
</header>

<main id="mainContent">
  <!-- динамический контент -->
</main>

<!-- Корзина (реестр выбранных блокировок) -->
<div class="cart-overlay" id="cartOverlay">
  <div class="cart-panel">
    <div class="cart-header">
      <h2><i class="fas fa-list" style="margin-right: 12px;"></i>Реестр запретов</h2>
      <button class="close-cart" id="closeCartBtn">&times;</button>
    </div>
    <ul class="cart-items" id="cartItemsList">
      <!-- сюда вставляются выбранные блокировки -->
    </ul>
    <div class="cart-total" id="cartTotal">0 ₽</div>
    <button class="checkout-btn" id="checkoutBtn">Подать заявку на блокировку <i class="fas fa-gavel"></i></button>
  </div>
</div>

<footer>
  <div class="footer-copy">© 2025 Федеральная служба по надзору в сфере связи</div>
  <div class="disclaimer"><i class="fas fa-balance-scale"></i> Все услуги предоставляются в рамках законодательства РФ. Сатирический контент.</div>
  <div class="footer-links">
    <a href="#"><i class="fab fa-telegram"></i></a>
    <a href="#"><i class="fas fa-lock"></i></a>
  </div>
</footer>

<script>
  (function() {
    // ----- Ироничный каталог услуг РКН -----
    const products = [
      { id: 1, name: 'Блокировка сайта (до 1000 п/з)', price: 49900, category: 'blok', img: 'https://images.unsplash.com/photo-1563986768609-322da13575f3?w=400&auto=format&fit=crop', tag: 'популярное' },
      { id: 2, name: 'Замедление трафика (медленный интернет)', price: 29900, category: 'zamed', img: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=400&auto=format&fit=crop', tag: 'акция' },
      { id: 3, name: 'Внесение в реестр OPI', price: 15000, category: 'reestr', img: 'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?w=400&auto=format&fit=crop', tag: 'новинка' },
      { id: 4, name: 'Изоляция рунета (комплекс)', price: 299000, category: 'kompl', img: 'https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=400&auto=format&fit=crop', tag: 'флагман' },
      { id: 5, name: 'DPI-фильтр "Глубокий прятки"', price: 89000, category: 'oborud', img: 'https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?w=400&auto=format&fit=crop', tag: '' },
      { id: 6, name: 'Пожизненная блокировка IP', price: 9900, category: 'blok', img: 'https://images.unsplash.com/photo-1614064641938-3bbee52942c7?w=400&auto=format&fit=crop', tag: 'хит' },
      { id: 7, name: 'Маркировка VPN как нарушителя', price: 45000, category: 'reestr', img: 'https://images.unsplash.com/photo-1624969862293-b749659d2dad?w=400&auto=format&fit=crop', tag: '' },
      { id: 8, name: 'Доступ к "пакету Яровой"', price: 199500, category: 'kompl', img: 'https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=400&auto=format&fit=crop', tag: '' }
    ];

    const categories = [
      { id: 'all', name: 'Все услуги' },
      { id: 'blok', name: 'Блокировки' },
      { id: 'zamed', name: 'Замедления' },
      { id: 'reestr', name: 'Реестры' },
      { id: 'kompl', name: 'Комплексные' },
      { id: 'oborud', name: 'Оборудование' }
    ];

    // Состояние приложения
    let currentPage = 'home';
    let currentCategory = 'all';
    let searchQuery = '';
    let cart = JSON.parse(localStorage.getItem('rkn_cart')) || [];

    // DOM элементы
    const mainEl = document.getElementById('mainContent');
    const cartOverlay = document.getElementById('cartOverlay');
    const cartToggleBtn = document.getElementById('cartToggleBtn');
    const closeCartBtn = document.getElementById('closeCartBtn');
    const cartItemsList = document.getElementById('cartItemsList');
    const cartTotalSpan = document.getElementById('cartTotal');
    const cartCounter = document.getElementById('cartCounter');
    const searchInput = document.getElementById('searchInput');
    const navPageBtns = document.querySelectorAll('.nav-page-btn');

    // ----- Рендер страниц -----
    function renderPage() {
      if (currentPage === 'home') renderHome();
      else if (currentPage === 'catalog') renderCatalog();
      else if (currentPage === 'about') renderAbout();
      updateCartCounter();
    }

    function renderHome() {
      let html = `
        <section style="margin: 30px 0; text-align: center;" class="glass-card" style="padding: 48px 30px;">
          <h1 style="font-size: 2.6rem; color: var(--primary-dark);"><i class="fas fa-shield" style="color: var(--primary);"></i> РКН.МАРКЕТ — всё для блокировок</h1>
          <p style="max-width: 800px; margin: 24px auto; font-size: 1.2rem;">Официальный поставщик решений по изоляции нежелательных ресурсов. Глубокие прятки (DPI) и внесение в реестр за 5 минут.</p>
          <div style="display: flex; gap: 20px; justify-content: center;">
            <button class="category-btn" style="font-size: 1.2rem; padding: 16px 40px;" onclick="window.app.setPage('catalog')">Перейти в каталог услуг</button>
            <button class="category-btn" style="background: var(--warning-red); color:white;" id="emergencyBtn">Срочная блокировка 24/7</button>
          </div>
        </section>
        <h2 style="margin-top: 40px;">Рекомендуемые решения</h2>
        <div class="products-grid" id="productsGridHome"></div>
      `;
      mainEl.innerHTML = html;
      const grid = document.getElementById('productsGridHome');
      if (grid) {
        grid.innerHTML = products.slice(0, 4).map(p => renderProductCard(p)).join('');
        attachAddToCartListeners(grid);
      }
      document.getElementById('emergencyBtn')?.addEventListener('click', ()=>{
        alert('Экстренная блокировка будет активирована. Ваш IP зафиксирован (шутка).');
      });
    }

    function renderCatalog() {
      let html = `
        <div class="categories-section" id="categoryFilters">
          ${categories.map(cat => `<button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">${cat.name}</button>`).join('')}
        </div>
        <div class="products-grid" id="productsGridCatalog"></div>
        <div class="pagination">
          <button class="pagination-btn"><i class="fas fa-chevron-left"></i></button>
          <span style="align-self:center; margin:0 10px;">Стр. 1 / 1</span>
          <button class="pagination-btn"><i class="fas fa-chevron-right"></i></button>
        </div>
      `;
      mainEl.innerHTML = html;
      filterAndRenderProducts();

      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          currentCategory = e.target.dataset.cat;
          renderCatalog();
        });
      });
    }

    function filterAndRenderProducts() {
      const grid = document.getElementById('productsGridCatalog');
      if (!grid) return;
      let filtered = products;
      if (currentCategory !== 'all') {
        filtered = filtered.filter(p => p.category === currentCategory);
      }
      if (searchQuery.trim() !== '') {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      }
      grid.innerHTML = filtered.map(p => renderProductCard(p)).join('');
      attachAddToCartListeners(grid);
    }

    function renderAbout() {
      mainEl.innerHTML = `
        <div class="glass-card" style="padding: 40px; max-width: 800px; margin: 30px auto;">
          <h2 style="color: var(--primary-dark);"><i class="fas fa-building-columns"></i> О Роскомнадзор.Маркет</h2>
          <p style="margin-top: 24px; font-size: 1.2rem; line-height:1.6;">Мы — официальный маркетплейс услуг по ограничению доступа. С 2022 года обеспечиваем цифровой суверенитет.</p>
          <p>📍 Внесено в реестр организаторов распространения информации</p>
          <p>🌐 Работаем по 149-ФЗ, 398-ФЗ и другим нормативным актам.</p>
          <p><i class="fas fa-warning"></i> Данный сайт носит сатирический характер и создан в учебных целях.</p>
        </div>
      `;
    }

    function renderProductCard(p) {
      return `<div class="product-card" data-id="${p.id}">
        ${p.tag ? `<span class="rkn-badge"><i class="fas fa-tag"></i> ${p.tag}</span>` : ''}
        <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
        <div class="product-title"><i class="fas fa-ban"></i> ${p.name}</div>
        <div class="product-price">${p.price.toLocaleString()} <small>₽</small></div>
        <button class="add-to-cart-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-img="${p.img}"><i class="fas fa-cart-plus"></i> В реестр</button>
      </div>`;
    }

    function attachAddToCartListeners(container) {
      container.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = +btn.dataset.id;
          const name = btn.dataset.name;
          const price = +btn.dataset.price;
          const img = btn.dataset.img;
          addToCart({ id, name, price, img });
        });
      });
    }

    // ----- Корзина (реестр) -----
    function addToCart(product) {
      const existing = cart.find(item => item.id === product.id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      saveCart();
      renderCartSidebar();
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      saveCart();
      renderCartSidebar();
    }

    function saveCart() {
      localStorage.setItem('rkn_cart', JSON.stringify(cart));
      updateCartCounter();
    }

    function updateCartCounter() {
      const totalItems = cart.reduce((acc, i) => acc + i.quantity, 0);
      cartCounter.innerText = totalItems;
    }

    function renderCartSidebar() {
      if (!cartItemsList) return;
      if (cart.length === 0) {
        cartItemsList.innerHTML = '<div style="text-align:center; opacity:0.7;">Реестр пуст. Добавьте блокировки.</div>';
        cartTotalSpan.innerText = `0 ₽`;
        return;
      }
      let html = '';
      let total = 0;
      cart.forEach(item => {
        total += item.price * item.quantity;
        html += `<li class="cart-item">
          <img src="${item.img}" alt="${item.name}">
          <div class="cart-item-info">
            <div class="cart-item-title">${item.name}</div>
            <div class="cart-item-price">${item.price.toLocaleString()} ₽ x ${item.quantity}</div>
          </div>
          <button class="cart-item-remove" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button>
        </li>`;
      });
      cartItemsList.innerHTML = html;
      cartTotalSpan.innerText = `${total.toLocaleString()} ₽`;
      cartItemsList.querySelectorAll('.cart-item-remove').forEach(btn => {
        btn.addEventListener('click', () => removeFromCart(+btn.dataset.id));
      });
    }

    // ----- Поиск -----
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      if (currentPage === 'catalog') {
        filterAndRenderProducts();
      }
    });

    // ----- Навигация страниц -----
    function setPage(page) {
      currentPage = page;
      navPageBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === page);
      });
      renderPage();
    }

    window.app = { setPage };

    navPageBtns.forEach(btn => {
      btn.addEventListener('click', () => setPage(btn.dataset.page));
    });

    // ----- Корзина (реестр) открыть/закрыть -----
    cartToggleBtn.addEventListener('click', () => {
      cartOverlay.classList.add('active');
      renderCartSidebar();
    });
    closeCartBtn.addEventListener('click', () => {
      cartOverlay.classList.remove('active');
    });
    cartOverlay.addEventListener('click', (e) => {
      if (e.target === cartOverlay) cartOverlay.classList.remove('active');
    });

    document.getElementById('checkoutBtn')?.addEventListener('click', () => {
      if (cart.length === 0) {
        alert('Добавьте услуги в реестр');
        return;
      }
      alert('Заявка на блокировку принята! (демо-режим, сатира)');
    });

    // Инициализация
    renderPage();
    renderCartSidebar();
    updateCartCounter();

    // PWA манифест (симуляция)
    const manifestBlob = {
      name: "РКН.Маркет — блокировки",
      short_name: "РКН.Маркет",
      start_url: ".",
      display: "standalone",
      background_color: "#276fdb",
      theme_color: "#276fdb",
      icons: [{ src: "https://via.placeholder.com/192x192/276fdb/ffffff?text=РКН", sizes: "192x192", type: "image/png" }]
    };
    const manifestString = JSON.stringify(manifestBlob);
    const manifestBlobUrl = 'data:application/manifest+json,' + encodeURIComponent(manifestString);
    document.querySelector('link[rel="manifest"]').setAttribute('href', manifestBlobUrl);

    if ('serviceWorker' in navigator) {
      // имитация
    }
  })();
</script>
</body>
</html>
