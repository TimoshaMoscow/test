<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎤 Голосовой ввод с вибр... ой.</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 28px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            word-break: break-word;
        }

        h1 span {
            background: #667eea;
            color: white;
            font-size: 16px;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .mic-container {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .mic-button {
            background: linear-gradient(145deg, #f0f0f0, #ffffff);
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #555;
            font-weight: 500;
            border: 3px solid white;
            outline: 2px solid transparent;
            outline-offset: 2px;
        }

        .mic-button:active {
            transform: scale(0.94);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2), inset 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .mic-button.listening {
            background: linear-gradient(145deg, #ff6b6b, #ff4757);
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        .mic-icon {
            font-size: 48px;
            line-height: 1;
        }

        .mic-status {
            font-size: 14px;
            opacity: 0.9;
        }

        .result-section {
            background: #f8f9ff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .label svg {
            opacity: 0.7;
        }

        .result-box {
            background: white;
            border-radius: 16px;
            padding: 20px;
            min-height: 120px;
            border: 2px solid #e0e0ff;
            margin-bottom: 20px;
            font-size: 18px;
            line-height: 1.5;
            color: #333;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .result-box.placeholder {
            color: #aaa;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-box .url-highlight {
            background: #e3f2fd;
            color: #1976d2;
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: 500;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1 1 auto;
            background: white;
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #444;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
            min-width: 140px;
        }

        .btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background: linear-gradient(145deg, #667eea, #5a67d8);
            color: white;
            border: none;
        }

        .btn-primary:active {
            background: #5a67d8;
        }

        .btn-success {
            background: linear-gradient(145deg, #48bb78, #38a169);
            color: white;
            border: none;
        }

        .footer-note {
            margin-top: 16px;
            font-size: 13px;
            color: #777;
            text-align: center;
        }

        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            background: #fed7d7;
            padding: 10px;
            border-radius: 40px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            🎤 Голосовой ввод с вибр... ой.
            <span>v2.2</span>
        </h1>

        <div class="mic-container">
            <button class="mic-button" id="micButton">
                <span class="mic-icon">🎙️</span>
                <span class="mic-status" id="micStatus">Начать</span>
            </button>
        </div>

        <div class="result-section">
            <div class="label">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                Распознанный текст:
            </div>
            <div class="result-box" id="resultBox">
                👆 Нажмите на микрофон и говорите
            </div>

            <div class="actions">
                <button class="btn" id="copyBtn">
                    <span>📋</span> Копировать
                </button>
                <button class="btn btn-primary" id="clearBtn">
                    <span>🗑️</span> Очистить
                </button>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="footer-note">
            © 2026 Голосовой ввод с вибр... ой.<br>
            🔗 "заходи на сайт тимоша тест" → https://timoshamoscow.github.io/test/
        </div>
    </div>

    <script>
        (function() {
            // Элементы DOM
            const micButton = document.getElementById('micButton');
            const micStatus = document.getElementById('micStatus');
            const resultBox = document.getElementById('resultBox');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');
            const errorMessage = document.getElementById('errorMessage');

            // Конфигурация URL для замены
            const TARGET_URL = 'https://timoshamoscow.github.io/test/';
            
            // Варианты распознавания URL (РАСШИРЕННЫЙ СПИСОК)
            const urlPatterns = [
                // Основной паттерн из вашего теста
                'заходите на сайт github тест',
                'заходи на сайт github тест',
                'зайдите на сайт github тест',
                'зайти на сайт github тест',
                'сайт github тест',
                'github тест',
                
                // Русские варианты
                'тимоша москоу слэш тест',
                'тимоша москоу слеш тест',
                'тимоша москоу слэш тэст',
                'тимоша москоу слеш тэст',
                'тимоша москоу / тест',
                'тимоша москоу / тэст',
                'тимоша москоу точка гитхаб точка ио слэш тест',
                'тимоша москоу точка гитхаб точка ио слеш тест',
                
                // Английские варианты
                'timosha moscow slash test',
                'timosha moscow slesh test',
                'timosha moscow / test',
                'timosha moscow dot github dot io slash test',
                'timosha moscow github io test',
                'timosha moscow.github.io/test',
                
                // Слитные варианты
                'тимошамоскоу слэш тест',
                'тимошамоскоу слеш тест',
                'тимошамоскоу / тест',
                'тимошамосоу тест',  // ваш вариант "самоскоу"
                'тимошамосоу слэш тест',
                'тимошамосоу слеш тест',
                'тимошамосоу / тест',
                'самоскоу тест',      // творческое произношение
                'самоскоу слэш тест',
                
                // С https://
                'эйч титипиэс двоеточие слэш слэш тимоша москоу точка гитхаб точка ио слэш тест',
                'https тимоша москоу точка гитхаб точка ио слэш тест',
                'https двоеточие слэш слэш тимоша москоу точка гитхаб точка ио слэш тест',
                
                // Короткие команды
                'открой сайт тест',
                'перейди на сайт тест',
                'сайт тест',
                'тестовый сайт',
                'мой сайт',
                'сайт тимоши',
                
                // Английские короткие
                'open test site',
                'go to test site',
                'test site',
                'github test site',
                
                // Комбинации с "заходи"
                'заходи на сайт',
                'заходите на сайт',
                'зайди на сайт',
                'захожу на сайт',
            ];

            // Переменные для распознавания речи
            let recognition = null;
            let isListening = false;
            let finalTranscript = '';
            let isFirstStart = true;

            // Проверка поддержки вибрации
            const vibrateSupported = 'vibrate' in navigator;

            function vibrate(pattern) {
                if (vibrateSupported) {
                    navigator.vibrate(pattern);
                }
            }

            // Функция для замены распознанного текста на URL
            function replaceWithUrl(text) {
                if (!text) return text;
                
                const lowerText = text.toLowerCase().trim();
                
                // Сначала проверяем точное совпадение с URL
                if (lowerText === TARGET_URL.toLowerCase()) {
                    return TARGET_URL;
                }
                
                // Проверяем все паттерны из списка
                for (const pattern of urlPatterns) {
                    if (lowerText.includes(pattern.toLowerCase())) {
                        return TARGET_URL;
                    }
                }
                
                // Проверяем отдельные слова и комбинации
                const words = lowerText.split(/\s+/);
                
                // Проверка на наличие "тимоша/москоу/самоскоу" + "тест"
                const hasTimosh = lowerText.includes('тимоша') || 
                                 lowerText.includes('timosha') || 
                                 lowerText.includes('самоскоу') ||
                                 lowerText.includes('тимошамосоу');
                                 
                const hasMoscow = lowerText.includes('москоу') || 
                                 lowerText.includes('moscow') || 
                                 lowerText.includes('мосоу');
                                 
                const hasTest = lowerText.includes('тест') || 
                              lowerText.includes('test') || 
                              lowerText.includes('тэст');
                
                const hasSite = lowerText.includes('сайт') || 
                              lowerText.includes('site') ||
                              lowerText.includes('github');
                
                if ((hasTimosh || hasMoscow) && (hasTest || hasSite)) {
                    return TARGET_URL;
                }
                
                // Проверка на слитное написание
                const noSpacesText = lowerText.replace(/\s+/g, '');
                if (noSpacesText.includes('тимошамоскоутест') ||
                    noSpacesText.includes('timoshamoscowtest') ||
                    noSpacesText.includes('тимошамосоутест') ||
                    noSpacesText.includes('самоскоутест')) {
                    return TARGET_URL;
                }
                
                return text;
            }

            // Функция для добавления пунктуации по интонации
            function addPunctuationByIntent(text, isFinal) {
                if (!text) return text;
                
                text = text.trim();
                
                if (text.length === 0) return text;
                
                const lastChar = text[text.length - 1];
                
                if (lastChar.match(/[.!?,:;]/)) {
                    return text;
                }
                
                if (isFinal) {
                    if (!text.match(/[.!?]$/)) {
                        return text + '.';
                    }
                } else {
                    const words = text.split(' ');
                    if (words.length > 2) {
                        const lastWord = words[words.length - 1];
                        if (lastWord.length > 2 && !text.match(/[,;:]$/)) {
                            return text + ',';
                        }
                    }
                }
                
                return text;
            }

            // Функция обновления отображения результата
            function updateResultDisplay(final, interim = '') {
                let displayFinal = final;
                let displayInterim = interim;
                
                // Проверяем финальный текст на наличие URL паттернов
                if (displayFinal) {
                    displayFinal = replaceWithUrl(displayFinal);
                }
                
                // Проверяем промежуточный текст
                if (displayInterim) {
                    displayInterim = replaceWithUrl(displayInterim);
                }
                
                if (displayInterim) {
                    const punctuatedInterim = addPunctuationByIntent(displayInterim, false);
                    resultBox.innerHTML = displayFinal + '<em style="color:#999;">' + punctuatedInterim + '</em>';
                } else {
                    if (displayFinal) {
                        // Подсвечиваем URL если он есть
                        if (displayFinal === TARGET_URL) {
                            resultBox.innerHTML = '<span class="url-highlight">🔗 ' + displayFinal + '</span>';
                        } else {
                            resultBox.textContent = displayFinal;
                        }
                        resultBox.classList.remove('placeholder');
                    } else {
                        resultBox.textContent = '👆 Нажмите на микрофон и говорите';
                        resultBox.classList.add('placeholder');
                    }
                }
                
                // Обновляем finalTranscript с заменой URL
                if (displayFinal) {
                    finalTranscript = displayFinal;
                }
            }

            function getCleanTextForCopy() {
                // Получаем текст из resultBox без HTML тегов
                const boxText = resultBox.textContent || '';
                
                if (boxText && boxText !== '👆 Нажмите на микрофон и говорите') {
                    return boxText.trim();
                }
                
                return '';
            }

            // Инициализация Web Speech API
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'ru-RU';
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.maxAlternatives = 3; // Увеличиваем для лучшего распознавания

                recognition.onresult = (event) => {
                    let interimTranscript = '';
                    let finalFragment = '';

                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        // Берем самый вероятный вариант распознавания
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            // Сначала проверяем на URL замену
                            const processedTranscript = replaceWithUrl(transcript);
                            finalFragment = addPunctuationByIntent(processedTranscript, true);
                            finalTranscript += finalFragment + ' ';
                        } else {
                            interimTranscript += transcript;
                        }
                    }

                    updateResultDisplay(finalTranscript, interimTranscript);
                };

                recognition.onerror = (event) => {
                    console.error('Ошибка распознавания:', event.error);
                    let userMessage = '';
                    switch(event.error) {
                        case 'no-speech':
                            userMessage = 'Речь не обнаружена. Попробуйте снова.';
                            break;
                        case 'audio-capture':
                            userMessage = 'Не найден микрофон. Проверьте подключение.';
                            break;
                        case 'not-allowed':
                            userMessage = 'Доступ к микрофону запрещён. Разрешите доступ.';
                            break;
                        default:
                            userMessage = 'Ошибка: ' + event.error;
                    }
                    showError(userMessage);
                    stopListening();
                };

                recognition.onend = () => {
                    if (isListening) {
                        stopListening();
                    }
                };
            } else {
                micButton.disabled = true;
                micButton.style.opacity = '0.5';
                micButton.style.cursor = 'not-allowed';
                micButton.title = 'Ваш браузер не поддерживает голосовой ввод';
                showError('Ваш браузер не поддерживает голосовой ввод. Попробуйте Chrome, Edge или Safari.');
            }

            function showError(msg) {
                errorMessage.textContent = msg;
                errorMessage.classList.add('show');
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 4000);
            }

            function startListening() {
                if (!recognition) return;

                vibrate(20);

                if (resultBox.textContent === '👆 Нажмите на микрофон и говорите' || isFirstStart) {
                    finalTranscript = '';
                    isFirstStart = false;
                } else {
                    finalTranscript = resultBox.textContent;
                }

                try {
                    recognition.start();
                    isListening = true;

                    micButton.classList.add('listening');
                    micStatus.textContent = 'Слушаю...';
                    resultBox.classList.remove('placeholder');

                    vibrate(30);
                } catch (e) {
                    console.error('Ошибка запуска распознавания:', e);
                    showError('Не удалось запустить микрофон');
                }
            }

            function stopListening() {
                if (!recognition) return;

                vibrate(20);

                try {
                    recognition.stop();
                } catch (e) {
                    console.error('Ошибка остановки распознавания:', e);
                }
                
                isListening = false;

                micButton.classList.remove('listening');
                micStatus.textContent = 'Начать';

                if (resultBox.innerHTML.includes('<em')) {
                    const cleanText = finalTranscript || '👆 Нажмите на микрофон и говорите';
                    if (cleanText === TARGET_URL) {
                        resultBox.innerHTML = '<span class="url-highlight">🔗 ' + cleanText + '</span>';
                    } else {
                        resultBox.textContent = cleanText;
                    }
                }

                if (!finalTranscript.trim()) {
                    resultBox.textContent = '👆 Нажмите на микрофон и говорите';
                    resultBox.classList.add('placeholder');
                }

                vibrate([10, 10, 10]);
            }

            micButton.addEventListener('click', () => {
                vibrate(15);

                if (!recognition) {
                    showError('Голосовой ввод не поддерживается');
                    return;
                }

                if (isListening) {
                    stopListening();
                } else {
                    startListening();
                }
            });

            copyBtn.addEventListener('click', () => {
                vibrate(20);

                const textToCopy = getCleanTextForCopy();

                if (!textToCopy) {
                    showError('Нет текста для копирования');
                    vibrate([30, 30, 30]);
                    return;
                }

                navigator.clipboard.writeText(textToCopy).then(() => {
                    const originalText = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<span>✅</span> Скопировано!';
                    copyBtn.classList.add('btn-success');
                    vibrate([20, 50, 20]);
                    setTimeout(() => {
                        copyBtn.innerHTML = '<span>📋</span> Копировать';
                        copyBtn.classList.remove('btn-success');
                    }, 2000);
                }).catch(err => {
                    console.error('Ошибка копирования:', err);
                    showError('Не удалось скопировать');
                    vibrate([30, 30, 30]);
                });
            });

            clearBtn.addEventListener('click', () => {
                vibrate(20);

                finalTranscript = '';
                resultBox.textContent = '👆 Нажмите на микрофон и говорите';
                resultBox.classList.add('placeholder');
                isFirstStart = true;

                vibrate(20);
            });

            window.addEventListener('beforeunload', () => {
                if (isListening && recognition) {
                    try {
                        recognition.stop();
                    } catch (e) {}
                }
            });

            if (resultBox.textContent === '👆 Нажмите на микрофон и говорите') {
                resultBox.classList.add('placeholder');
            }
        })();
    </script>
</body>
</html>
